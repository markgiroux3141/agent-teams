<script type="application/json" id="data">{"run_id":"20260423_054538","team":"recipes-website","goal":"Ship a recipes website. Take the vague brief through two rounds of team deliberation, produce a SPEC.md that pins every cross-team contract, then dispatch parallel build tasks with no further coordination. Verify the produced files form a working static site.","agents":["lead","backend","frontend","ux","writer"],"events":[{"ts":"2026-04-23T05:46:12.613960+00:00","kind":"note","label":"writes DONE_CRITERIA.md","who":"lead"},{"ts":"2026-04-23T05:46:16.582517+00:00","kind":"note","label":"creates task: Propose \u2014 backend","who":"lead"},{"ts":"2026-04-23T05:46:16.999498+00:00","kind":"note","label":"creates task: Propose \u2014 frontend","who":"lead"},{"ts":"2026-04-23T05:46:17.418619+00:00","kind":"note","label":"creates task: Propose \u2014 ux","who":"lead"},{"ts":"2026-04-23T05:46:17.723144+00:00","kind":"note","label":"creates task: Propose \u2014 writer","who":"lead"},{"ts":"2026-04-23T05:46:19.197361+00:00","kind":"assign","label":"dispatch t_001","from":"lead","to":"backend"},{"ts":"2026-04-23T05:46:19.441640+00:00","kind":"assign","label":"dispatch t_002","from":"lead","to":"frontend"},{"ts":"2026-04-23T05:46:19.617702+00:00","kind":"assign","label":"dispatch t_003","from":"lead","to":"ux"},{"ts":"2026-04-23T05:46:19.718346+00:00","kind":"assign","label":"dispatch t_004","from":"lead","to":"writer"},{"ts":"2026-04-23T05:46:55.897125+00:00","kind":"msg","label":"Hi backend\u2014 Before I finalize my proposal, I want to confirm the recipe schema. I need th\u2026","full":"Hi backend\u2014 Before I finalize my proposal, I want to confirm the recipe schema. I need these REQUIRED fields per recipe: - name (string) - category (string \u2014 will be one of: breakfast, main, dessert) - time (integer, minutes) - servings (integer) - description (string, 1\u20132 sentences max) - ingredients (list of strings with amounts, e.g., '2 cups flour') - steps (list of strings, one per step) OPTIONAL (nice to have, don't block on these): - difficulty (string: easy / moderate / challenging) - dietary tags (list of strings: vegetarian, vegan, gluten-free, etc.) Does your proposed schema cover these? If you're thinking a different shape for ingredients or want to push back on any field, let me know now so I can bake it into my proposal. Thanks!","from":"writer","to":"backend"},{"ts":"2026-04-23T05:46:57.316204+00:00","kind":"msg","label":"Hi UX\u2014 Quick question on content density to shape what I write: Your brief mentions cards\u2026","full":"Hi UX\u2014 Quick question on content density to shape what I write: Your brief mentions cards should display title, time, category, and 'a line or two of description.' I'm planning to write descriptions as 1\u20132 punchy sentences max (roughly 15\u201325 words). Will that fit the container you're designing? Or do you want me shorter/longer? Also, are you leaning toward the no-images approach or unicode glyphs per category? Affects how much weight the description needs to carry visually. Thanks!","from":"writer","to":"ux"},{"ts":"2026-04-23T05:47:00.326457+00:00","kind":"msg","label":"Hi \u2014 I'm proposing **static HTML/CSS/JS** for the stack. Single-page app with a recipe li\u2026","full":"Hi \u2014 I'm proposing **static HTML/CSS/JS** for the stack. Single-page app with a recipe list as a card grid, detail on click opens a modal. For styling hooks, I'll use **BEM-style CSS classes**: - '.recipe-list' \u2014 the grid container - '.recipe-card' \u2014 each recipe card - '.recipe-card__title', '.recipe-card__time', '.recipe-card__category', '.recipe-card__description' \u2014 card internals - '.recipe-detail-modal' \u2014 the modal overlay and content - '.category-filter', '.search-input' \u2014 filter/search controls - '.app-header' \u2014 header This gives you a clean surface to style against without needing to know anything about the JS. All class names will be semantic and stable. Does BEM-style naming work for you? Any preference for how I structure the card hierarchy?","from":"frontend","to":"ux"},{"ts":"2026-04-23T05:47:02.199672+00:00","kind":"msg","label":"Hi \u2014 I'm proposing **static HTML/CSS/JS** with vanilla JavaScript. Single-page app: recip\u2026","full":"Hi \u2014 I'm proposing **static HTML/CSS/JS** with vanilla JavaScript. Single-page app: recipe list on load, detail on click opens a modal. For data delivery, I need the recipe data as a JSON structure. Two options: 1. **recipes.json** \u2014 separate file I fetch() on page load 2. **recipes.js** \u2014 CommonJS/ES6 module I import() or a global variable Given the scope (8\u201310 recipes, no runtime API), either works fine. I lean toward **recipes.json** because it's simpler \u2014 plain data, no build step needed on my end, and the writer can produce it directly. Which delivery mechanism fits your thinking? If backend prefers to provide recipes.js or a different format, I can adapt.","from":"frontend","to":"backend"},{"ts":"2026-04-23T05:47:09.914561+00:00","kind":"msg","label":"Hey \u2014 I need to lock down the naming surface you'll expose for styling. Before I write th\u2026","full":"Hey \u2014 I need to lock down the naming surface you'll expose for styling. Before I write the UX proposal, tell me: 1. What's your component structure? Will you emit named classes (e.g., '.rx-recipe-card', '.rx-list-container'), or are you using CSS-in-JS / styled components where I'd target component names directly? 2. Do you plan theme tokens/CSS variables, or should I define the palette in plain CSS? 3. For layout/responsive, do you want me to assume Flexbox/Grid in plain CSS, Tailwind classes that I configure, or component-level props? I'm designing for a warm, editorial feel \u2014 card grid on list, single column below 768px. I need the hooks locked so I can be systematic about what you'll build.","from":"ux","to":"frontend"},{"ts":"2026-04-23T05:47:12.054616+00:00","kind":"msg","label":"I'm designing the recipe card and list layout. Before I finalize the proposal, I need to\u2026","full":"I'm designing the recipe card and list layout. Before I finalize the proposal, I need to know your content density: 1. Recipe titles \u2014 short (e.g., 'Pasta') or longer (e.g., 'Creamy Tuscan Chicken Pasta with Fresh Basil')? 2. Recipe descriptions \u2014 are you providing a one-liner teaser, a 2\u20133 sentence summary, or nothing (just title + metadata)? 3. How many recipes are we launching with, and how many categories? I'm planning a card-based list on desktop (grid), single column on mobile. Each card will show title, cook time, category, and description (if you're providing one). Help me size the container right.","from":"ux","to":"writer"},{"ts":"2026-04-23T05:47:13.934340+00:00","kind":"msg","label":"Hi \u2014 backend here. Before I lock my schema proposal, let me confirm your fields list. I'm\u2026","full":"Hi \u2014 backend here. Before I lock my schema proposal, let me confirm your fields list. I'm proposing a recipe object with: - name, category, time (minutes), servings, description, ingredients (as strings like '2 cups flour'), steps - optional: difficulty (easy|medium|hard), tags (array of strings like ['vegetarian', 'gluten-free']) Does that cover what you need to write? Any fields I'm missing or should drop? Also: ingredients as strings acceptable, or do you want structured {amount, unit, item} objects? I'm advocating for strings to keep it simple. \u2014backend","from":"backend","to":"writer"},{"ts":"2026-04-23T05:47:15.244435+00:00","kind":"msg","label":"Hi \u2014 backend here. Before I finalize my proposal, I need to understand your view technolo\u2026","full":"Hi \u2014 backend here. Before I finalize my proposal, I need to understand your view technology. What are you leaning toward? Vanilla HTML/JS, React, Vue, server-rendered, or something else? Once I know that, I can propose a matching data-plane architecture (e.g., JSON file + JS module, React context, fetch from an API, etc.). Also: for this scope (8 recipes), do you see client-side search/filter/sort, or are you thinking something else? \u2014backend","from":"backend","to":"frontend"},{"ts":"2026-04-23T05:47:18.424596+00:00","kind":"msg","label":"Perfect timing! Here's what I'm planning: **Titles:** Short \u2014 2\u20134 words when possible. Ex\u2026","full":"Perfect timing! Here's what I'm planning: **Titles:** Short \u2014 2\u20134 words when possible. Examples: 'Fluffy Pancakes', 'Tomato Soup', 'Chocolate Cake'. Makes for a crisp card. **Descriptions:** 1\u20132 sentences max. Warm, practical tone \u2014 why you'd want to make the dish. No marketing speak. Something like: 'Golden, buttery pancakes with a tender crumb inside. Ready in 20 minutes, feeds four.' **Recipes & categories:** 8 recipes total, across three categories: - Breakfast (2\u20133) - Main (3\u20134) - Dessert (2\u20133) This should give your card layout something to breathe, and the category filter has enough diversity to feel useful without being overwhelming. Does that sizing work for your design?","from":"writer","to":"ux"},{"ts":"2026-04-23T05:47:19.275886+00:00","kind":"msg","label":"Perfect \u2014 1\u20132 punchy sentences (15\u201325 words) is exactly what I need. Gives the descriptio\u2026","full":"Perfect \u2014 1\u20132 punchy sentences (15\u201325 words) is exactly what I need. Gives the description breathing room in the card without making it text-heavy. Going with unicode glyphs per category as decorative markers (no external image URLs). This keeps the design focus on typography and lets the description carry the emotional weight. Will use something like \ud83c\udf5d, \ud83e\udd57, \ud83c\udf70, etc. as a category icon. Sizing the card for your content density now.","from":"ux","to":"writer"},{"ts":"2026-04-23T05:47:20.776507+00:00","kind":"msg","label":"BEM naming is perfect \u2014 that's exactly the surface I need. Your class structure is clean.\u2026","full":"BEM naming is perfect \u2014 that's exactly the surface I need. Your class structure is clean. Confirming my assumptions: I'll style '.recipe-list' as a responsive grid (2\u20133 columns on desktop, 1 column on mobile at 768px breakpoint), and each '.recipe-card' will have enough vertical padding for title + time + category line + description (1\u20132 sentences). The modal styling I'll handle against '.recipe-detail-modal' and its internals. Ready to write the proposal with these contracts locked.","from":"ux","to":"frontend"},{"ts":"2026-04-23T05:47:22.928437+00:00","kind":"msg","label":"Great \u2014 **recipes.json** works perfectly for me. Plain data, no build step, writer mainta\u2026","full":"Great \u2014 **recipes.json** works perfectly for me. Plain data, no build step, writer maintains it directly. I'll structure it as a JSON array of recipe objects. You fetch it on page load and populate the list. Sound good? For search/filter/sort on client-side \u2014 I'll provide utility functions in a JS module (e.g., filterByCategory, search, sortByTime) that you call when the user interacts with filters/search. Does that fit your modal detail flow? \u2014backend","from":"backend","to":"frontend"},{"ts":"2026-04-23T05:47:24.640123+00:00","kind":"msg","label":"Hi \u2014 backend here. Just confirming a couple of constraints for styling: Frontend is propo\u2026","full":"Hi \u2014 backend here. Just confirming a couple of constraints for styling: Frontend is proposing vanilla HTML/CSS/JS with a card grid list view + modal detail. Categories: breakfast, main, dessert. You mentioned either no images OR unicode/icon glyphs per category. Can you confirm which? That might affect my schema (do I store a category icon/emoji, or leave that to CSS?). Also, cards showing: title, time, category, 1-2 line description \u2014 does that match what frontend will emit? \u2014backend","from":"backend","to":"ux"},{"ts":"2026-04-23T05:47:26.309764+00:00","kind":"msg","label":"Perfect questions. Here's my answer: 1. **Component structure**: BEM-style named classes\u2026","full":"Perfect questions. Here's my answer: 1. **Component structure**: BEM-style named classes in plain HTML/CSS, no CSS-in-JS. I'll emit semantic class names like '.recipe-card', '.recipe-card__title', etc. You style them as regular CSS selectors. Full control over styling with standard CSS. 2. **Theme tokens**: I propose plain CSS with custom properties (CSS variables). I'll define semantic variable names in a ':root' block (e.g., '--color-accent', '--font-serif', '--spacing-base'), and you fill in the values in your stylesheet. Keeps the separation clean: I define hooks, you define values. 3. **Layout/responsive**: I'll structure the HTML (flexbox-ready containers, semantic element hierarchy). No inline styles, no layout classes. You apply the Flexbox/Grid rules and media queries via your CSS. I assume you'll handle the 768px breakpoint and single-column layout on mobile. So to summarize: **clean semantic HTML + BEM classes**, UX adds all visual styling (colors, typography, spacing, layout, responsive) via plain CSS with custom properties for the palette.","from":"frontend","to":"ux"},{"ts":"2026-04-23T05:47:28.339322+00:00","kind":"msg","label":"Clarifications: 1. **Stack**: Vanilla HTML/CSS/JS. Single HTML file, no build, no framewo\u2026","full":"Clarifications: 1. **Stack**: Vanilla HTML/CSS/JS. Single HTML file, no build, no framework. I load recipe data on page load and render it with vanilla JS. 2. **Data delivery**: I need the recipes as JSON. Either: - A 'recipes.json' file I fetch() on load, or - A 'recipes.js' ES module I import(), or - Inline JSON in a '<script type='application/json'>' tag in the HTML. I prefer **recipes.json** (plain data, no module system). Can you produce that? 3. **Client-side search/filter/sort**: Yes. I'll implement client-side search (text match on title/description) and category filtering via dropdown. No server calls. The UX is snappy because everything happens in the browser. Once I know you can deliver recipes.json, I'm ready to lock the data schema.","from":"frontend","to":"backend"},{"ts":"2026-04-23T05:47:38.330692+00:00","kind":"msg","label":"Thanks! Your schema is exactly what I need. Confirmed: - Required: name, category, time (\u2026","full":"Thanks! Your schema is exactly what I need. Confirmed: - Required: name, category, time (minutes), servings, description, ingredients (strings), steps \u2713 - Optional: difficulty (easy|medium|hard), tags (array) \u2713 - Ingredients as strings ('2 cups flour') is my preference \u2014 love keeping it simple. \u2713 This matches my proposal perfectly. I'm good to go.","from":"writer","to":"backend"},{"ts":"2026-04-23T05:47:40.700255+00:00","kind":"done","label":"t_003 done \u2192 proposals/ux.md","from":"ux","to":"lead"},{"ts":"2026-04-23T05:47:41.834836+00:00","kind":"done","label":"t_004 done \u2192 proposals/writer.md","from":"writer","to":"lead"},{"ts":"2026-04-23T05:47:52.699867+00:00","kind":"done","label":"t_001 done \u2192 proposals/backend.md","from":"backend","to":"lead"},{"ts":"2026-04-23T05:47:55.610858+00:00","kind":"done","label":"t_002 done \u2192 proposals/frontend.md","from":"frontend","to":"lead"},{"ts":"2026-04-23T05:48:43.555263+00:00","kind":"note","label":"creates task: Write SPEC.md (Phase 2 Synthesis)","who":"lead"},{"ts":"2026-04-23T05:48:45.182409+00:00","kind":"assign","label":"dispatch t_005","from":"lead","to":"backend"},{"ts":"2026-04-23T05:48:59.377972+00:00","kind":"msg","label":"Perfect. Your sizing is exactly what I designed for \u2014 8 recipes across 3 categories gives\u2026","full":"Perfect. Your sizing is exactly what I designed for \u2014 8 recipes across 3 categories gives the grid room to breathe on desktop and flows cleanly to a single column on mobile. Short titles (2\u20134 words) + descriptions (1\u20132 sentences) fit the card padding and visual hierarchy I proposed. The tone you're describing (warm, practical, no marketing) matches the editorial direction perfectly. Recipe card is ready to receive your content.","from":"ux","to":"writer"},{"ts":"2026-04-23T05:49:00.866566+00:00","kind":"msg","label":"Two clarifications: 1. **Unicode glyphs per category:** Store the emoji/glyph as part of\u2026","full":"Two clarifications: 1. **Unicode glyphs per category:** Store the emoji/glyph as part of the category metadata in your schema (e.g., '{ 'name': 'Breakfast', 'emoji': '\ud83c\udf05' }'). Frontend will render it inline with the category name; I'll style it with CSS. This keeps it data-driven and lets frontend/UX treat it as a standard field. 2. **Card structure:** Confirmed \u2014 title, time, category (with emoji), 1\u20132 line description. That's the exact surface I designed for.","from":"ux","to":"backend"},{"ts":"2026-04-23T05:49:01.672133+00:00","kind":"msg","label":"Excellent. Your setup is exactly what I need: - BEM classes for my selectors \u2713 - Plain CS\u2026","full":"Excellent. Your setup is exactly what I need: - BEM classes for my selectors \u2713 - Plain CSS with custom properties for palette tokens \u2713 - I own visual styling (colors, type, spacing, layout, responsive) \u2713 - I'll handle 768px breakpoint and mobile single-column layout \u2713 Ready to build against this contract once SPEC.md lands.","from":"ux","to":"frontend"},{"ts":"2026-04-23T05:50:10.495704+00:00","kind":"done","label":"t_005 done \u2192 SPEC.md","from":"backend","to":"lead"},{"ts":"2026-04-23T05:50:44.714373+00:00","kind":"note","label":"creates task: Build \u2014 backend","who":"lead"},{"ts":"2026-04-23T05:51:02.305975+00:00","kind":"note","label":"creates task: Build \u2014 frontend","who":"lead"},{"ts":"2026-04-23T05:51:13.095531+00:00","kind":"note","label":"creates task: Build \u2014 ux","who":"lead"},{"ts":"2026-04-23T05:51:27.223413+00:00","kind":"note","label":"creates task: Build \u2014 writer","who":"lead"},{"ts":"2026-04-23T05:51:29.259745+00:00","kind":"assign","label":"dispatch t_006","from":"lead","to":"backend"},{"ts":"2026-04-23T05:51:29.502222+00:00","kind":"assign","label":"dispatch t_007","from":"lead","to":"frontend"},{"ts":"2026-04-23T05:51:29.742949+00:00","kind":"assign","label":"dispatch t_008","from":"lead","to":"ux"},{"ts":"2026-04-23T05:51:29.956146+00:00","kind":"assign","label":"dispatch t_009","from":"lead","to":"writer"},{"ts":"2026-04-23T05:52:13.999236+00:00","kind":"done","label":"t_009 done \u2192 src/data/recipes.json","from":"writer","to":"lead"},{"ts":"2026-04-23T05:52:53.282324+00:00","kind":"done","label":"t_008 done \u2192 src/styles.css","from":"ux","to":"lead"},{"ts":"2026-04-23T05:53:14.793175+00:00","kind":"done","label":"t_007 done \u2192 src/index.html","from":"frontend","to":"lead"},{"ts":"2026-04-23T05:53:36.663404+00:00","kind":"done","label":"t_006 done \u2192 src/js/recipes.js","from":"backend","to":"lead"},{"ts":"2026-04-23T05:54:43.153640+00:00","kind":"note","label":"finalize()","who":"lead"}]}</script>
<script>
(() => {
  'use strict';
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const XHTML_NS = 'http://www.w3.org/1999/xhtml';
  const data = JSON.parse(document.getElementById('data').textContent);
  const agents = data.agents;
  const events = data.events;

  // Per-agent emoji + role hint. Fallback = generic person.
  const AVATAR = {
    lead:     { emoji: '🧑\u200D💼', role: 'manager' },
    backend:  { emoji: '👨\u200D💻', role: 'backend' },
    frontend: { emoji: '👩\u200D💻', role: 'frontend' },
    qa:       { emoji: '🧑\u200D🔬', role: 'qa' },
    design:   { emoji: '🧑\u200D🎨', role: 'design' },
  };
  const FALLBACK_AVATAR = { emoji: '👤', role: '' };
  const meta = (a) => AVATAR[a] || { emoji: FALLBACK_AVATAR.emoji, role: a };

  // ---- Stage layout ----
  const STAGE_W = 1320;
  const STAGE_H = 520;
  const FLOOR_Y = 420;
  const HEAD_Y  = 360;  // rough y where bubble tail should touch
  const LEFT_MARGIN = 80;
  const RIGHT_MARGIN = 80;
  const span = STAGE_W - LEFT_MARGIN - RIGHT_MARGIN;
  const n = Math.max(1, agents.length);
  const positions = {};
  agents.forEach((a, i) => {
    const x = LEFT_MARGIN + (n === 1 ? span/2 : (span * i / (n - 1)));
    positions[a] = { x, headY: HEAD_Y, footY: FLOOR_Y };
  });
  const posOf = (a) => positions[a] || {
    x: STAGE_W - RIGHT_MARGIN / 2, headY: HEAD_Y, footY: FLOOR_Y
  };

  // ---- Build the stage SVG ----
  const stageDiv = document.getElementById('stage');
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${STAGE_W} ${STAGE_H}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  // Arrow markers
  const defs = document.createElementNS(SVG_NS, 'defs');
  const mk = (id, color) => `
    <marker id="${id}" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="${color}"/>
    </marker>`;
  defs.innerHTML =
    mk('mkMsg',    '#22d3ee') +
    mk('mkAssign', '#60a5fa') +
    mk('mkDone',   '#4ade80') +
    mk('mkFailed', '#f87171');
  svg.appendChild(defs);

  // Floor
  const floor = document.createElementNS(SVG_NS, 'rect');
  floor.setAttribute('x', 0);
  floor.setAttribute('y', FLOOR_Y + 40);
  floor.setAttribute('width', STAGE_W);
  floor.setAttribute('height', STAGE_H - (FLOOR_Y + 40));
  floor.setAttribute('class', 'floor');
  svg.appendChild(floor);

  const floorLine = document.createElementNS(SVG_NS, 'line');
  floorLine.setAttribute('x1', 20);
  floorLine.setAttribute('x2', STAGE_W - 20);
  floorLine.setAttribute('y1', FLOOR_Y + 40);
  floorLine.setAttribute('y2', FLOOR_Y + 40);
  floorLine.setAttribute('class', 'floor-line');
  svg.appendChild(floorLine);

  // Avatars (the cast)
  const avatarEls = {};
  const nameEls = {};
  agents.forEach((a) => {
    const p = posOf(a);
    const m = meta(a);
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('transform', `translate(${p.x}, ${p.footY})`);
    g.setAttribute('data-agent', a);

    const avatar = document.createElementNS(SVG_NS, 'text');
    avatar.setAttribute('class', 'avatar');
    avatar.setAttribute('x', 0);
    avatar.setAttribute('y', -10);
    avatar.textContent = m.emoji;
    g.appendChild(avatar);

    const name = document.createElementNS(SVG_NS, 'text');
    name.setAttribute('class', 'agent-name');
    name.setAttribute('x', 0);
    name.setAttribute('y', 64);
    name.textContent = a;
    g.appendChild(name);

    if (m.role) {
      const role = document.createElementNS(SVG_NS, 'text');
      role.setAttribute('class', 'agent-role');
      role.setAttribute('x', 0);
      role.setAttribute('y', 80);
      role.textContent = m.role;
      g.appendChild(role);
    }

    svg.appendChild(g);
    avatarEls[a] = avatar;
    nameEls[a] = name;

    // Stagger idle animations so the cast doesn't bob in unison
    const stagger = (Math.abs(a.charCodeAt(0) + a.length) % 4) * 0.5;
    avatar.style.animationDelay = stagger + 's';
  });

  // Arrow layer (under bubbles) and bubble layer
  const arrowLayer = document.createElementNS(SVG_NS, 'g');
  arrowLayer.setAttribute('class', 'arrow-layer');
  svg.appendChild(arrowLayer);
  const bubbleLayer = document.createElementNS(SVG_NS, 'g');
  bubbleLayer.setAttribute('class', 'bubble-layer');
  svg.appendChild(bubbleLayer);

  stageDiv.appendChild(svg);

  // ---- Bubble + arrow renderers ----
  let currentBubble = null;
  let currentArrow = null;
  let reactionTimer = null;

  function clearStageFX() {
    if (currentBubble) { currentBubble.remove(); currentBubble = null; }
    if (currentArrow)  { currentArrow.remove();  currentArrow = null; }
    if (reactionTimer) { clearTimeout(reactionTimer); reactionTimer = null; }
    // Remove lingering CSS animation classes
    Object.values(avatarEls).forEach(a => {
      a.classList.remove('speaking');
      a.classList.remove('listening');
    });
    Object.entries(nameEls).forEach(([k, el]) => el.classList.remove('active'));
  }

  function drawBubble(who, text, kind) {
    const p = posOf(who);
    // Bubble sizing: width scales with text until 520px, then we wrap.
    // Height is derived from the estimated wrapped row count.
    const len = text.length;
    const W = Math.min(520, Math.max(180, len * 6.8 + 36));
    const approxCharsPerRow = Math.max(18, Math.floor((W - 28) / 7.2));
    const rows = Math.max(1, Math.ceil(len / approxCharsPerRow));
    const H = Math.min(240, 44 + rows * 20);
    const cx = p.x;
    // Anchor the bubble BOTTOM ~30px above the head so the tail tip
    // sits just above it regardless of how tall the bubble grows.
    const baseY = p.headY - 30;
    // Clamp x so bubble doesn't run off either edge
    const minCx = W / 2 + 12;
    const maxCx = STAGE_W - W / 2 - 12;
    const anchorX = Math.max(minCx, Math.min(maxCx, cx));

    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('class', 'bubble');
    g.setAttribute('transform', `translate(${anchorX}, ${baseY})`);

    const rect = document.createElementNS(SVG_NS, 'rect');
    rect.setAttribute('x', -W / 2);
    rect.setAttribute('y', -H);
    rect.setAttribute('width', W);
    rect.setAttribute('height', H);
    rect.setAttribute('rx', 12);
    rect.setAttribute('class', 'bubble-bg ' + kind);
    g.appendChild(rect);

    // Tail points from bubble down to speaker's head
    const tailBaseX = Math.max(-W / 2 + 14,
                               Math.min(W / 2 - 14, cx - anchorX));
    const tailPath = document.createElementNS(SVG_NS, 'polygon');
    tailPath.setAttribute('points',
      `${tailBaseX - 9},0 ${tailBaseX + 9},0 ${tailBaseX},22`);
    tailPath.setAttribute('class', 'bubble-tail ' + (kind === 'note' ? 'note' : ''));
    g.appendChild(tailPath);

    // Tail outline: two short lines to fake a border on just the sides of the tail
    const leftLine = document.createElementNS(SVG_NS, 'line');
    leftLine.setAttribute('x1', tailBaseX - 9);
    leftLine.setAttribute('y1', 0);
    leftLine.setAttribute('x2', tailBaseX);
    leftLine.setAttribute('y2', 22);
    leftLine.setAttribute('stroke', rect.style.stroke || '');
    g.appendChild(leftLine);

    // Sender tag (small "from:" label inside the bubble)
    const from = document.createElementNS(SVG_NS, 'text');
    from.setAttribute('class', 'bubble-from');
    from.setAttribute('x', -W / 2 + 10);
    from.setAttribute('y', -H + 14);
    from.textContent = who;
    g.appendChild(from);

    // Body text via foreignObject so it wraps
    const fo = document.createElementNS(SVG_NS, 'foreignObject');
    fo.setAttribute('x', -W / 2 + 10);
    fo.setAttribute('y', -H + 18);
    fo.setAttribute('width', W - 20);
    fo.setAttribute('height', H - 22);
    const body = document.createElementNS(XHTML_NS, 'div');
    body.setAttribute('class', 'bubble-text');
    body.textContent = text;
    fo.appendChild(body);
    g.appendChild(fo);

    bubbleLayer.appendChild(g);
    // Trigger CSS transition
    requestAnimationFrame(() => g.classList.add('show'));
    return g;
  }

  function drawArrow(from, to, kind) {
    if (!from || !to || from === to) return null;
    const a = posOf(from);
    const b = posOf(to);
    // Curve upward over the heads
    const midX = (a.x + b.x) / 2;
    const midY = Math.min(a.headY, b.headY) - 70;
    const dir = b.x >= a.x ? 1 : -1;
    const startX = a.x + 32 * dir;
    const endX   = b.x - 28 * dir;
    const startY = a.headY - 20;
    const endY   = b.headY - 20;
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d',
      `M ${startX} ${startY} Q ${midX} ${midY} ${endX} ${endY}`);
    path.setAttribute('class', 'arrow ' + kind);
    const marker =
      kind === 'done'   ? 'mkDone' :
      kind === 'failed' ? 'mkFailed' :
      kind === 'assign' ? 'mkAssign' : 'mkMsg';
    path.setAttribute('marker-end', `url(#${marker})`);
    arrowLayer.appendChild(path);
    requestAnimationFrame(() => path.classList.add('show'));
    return path;
  }

  function reactSpeaker(who) {
    const a = avatarEls[who];
    if (!a) return;
    a.classList.remove('speaking');
    // force reflow so the animation restarts
    void a.getBoundingClientRect();
    a.classList.add('speaking');
    if (nameEls[who]) nameEls[who].classList.add('active');
  }
  function reactListener(who) {
    const a = avatarEls[who];
    if (!a) return;
    a.classList.remove('listening');
    void a.getBoundingClientRect();
    a.classList.add('listening');
    if (nameEls[who]) nameEls[who].classList.add('active');
  }

  function renderEvent(e) {
    if (!e) return;
    const kind = e.kind;
    const body = (e.full && e.full.length > 0) ? e.full : (e.label || '');
    if (kind === 'note') {
      currentBubble = drawBubble(e.who, body, 'note');
      reactSpeaker(e.who);
    } else {
      currentBubble = drawBubble(e.from, body, kind);
      currentArrow = drawArrow(e.from, e.to, kind);
      reactSpeaker(e.from);
      reactionTimer = setTimeout(() => reactListener(e.to), 350);
    }
  }

  // ---- Filter: "Human only" keeps only peer-to-peer `msg` events. ----
  let visibleEvents = events.slice();
  let logEntries = [];

  function buildLogEntries() {
    logEntries = visibleEvents.map((e, i) => {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.idx = String(i);
      const tag = document.createElement('span');
      tag.className = 'tag ' + e.kind;
      tag.textContent = e.kind;
      div.appendChild(tag);
      const who = document.createElement('span');
      who.className = 'who';
      who.textContent = e.kind === 'note' ? (e.who || '?') : (e.from || '?');
      div.appendChild(who);
      const sep = document.createElement('span');
      if (e.kind === 'note') {
        sep.textContent = ' · ';
        div.appendChild(sep);
      } else {
        sep.textContent = ' → ';
        const to = document.createElement('span');
        to.className = 'to';
        to.textContent = e.to || '?';
        div.appendChild(sep);
        div.appendChild(to);
        const colon = document.createElement('span');
        colon.textContent = ': ';
        div.appendChild(colon);
      }
      const body = document.createElement('span');
      body.textContent = (e.full && e.full.length > 0) ? e.full : (e.label || '');
      div.appendChild(body);
      return div;
    });
  }

  // ---- Subtitle log ----
  const logEl = document.getElementById('log');

  function renderLog(upTo) {
    // upTo = index of last visible entry in `visibleEvents`; -1 = empty
    logEl.innerHTML = '';
    for (let i = 0; i <= upTo; i++) {
      const entry = logEntries[i];
      if (!entry) continue;
      entry.classList.toggle('current', i === upTo);
      logEl.appendChild(entry);
    }
    if (upTo >= 0 && logEntries[upTo]) {
      logEntries[upTo].scrollIntoView({block: 'nearest', behavior: 'smooth'});
    }
  }

  // ---- Playback controls ----
  let idx = -1;
  let playing = false;
  let timer = null;
  const BASE_DELAY = 2000; // ms/event at 1x
  const speedEl = document.getElementById('speed');
  const scrubEl = document.getElementById('scrubber');
  const progEl  = document.getElementById('progress');
  const playBtn = document.getElementById('btn-play');
  const backBtn = document.getElementById('btn-back');
  const nextBtn = document.getElementById('btn-next');
  const humanEl = document.getElementById('human-only');
  const humanLabel = document.getElementById('human-only-label');
  const pairedEl = document.getElementById('paired');
  const pairedLabel = document.getElementById('paired-label');

  const delay = () => BASE_DELAY / parseFloat(speedEl.value || '1');

  function updateProgress() {
    const n = idx + 1;
    progEl.textContent = n + ' / ' + visibleEvents.length;
    scrubEl.value = String(n);
    backBtn.disabled = idx < 0;
    nextBtn.disabled = idx >= visibleEvents.length - 1;
  }
  function setTo(i) {
    idx = Math.max(-1, Math.min(visibleEvents.length - 1, i));
    clearStageFX();
    if (idx >= 0) renderEvent(visibleEvents[idx]);
    renderLog(idx);
    updateProgress();
  }
  function stepNext() {
    if (idx >= visibleEvents.length - 1) { pause(); return; }
    setTo(idx + 1);
  }
  function stepBack() {
    if (idx < 0) return;
    setTo(idx - 1);
  }
  function play() {
    if (idx >= visibleEvents.length - 1) setTo(-1);
    playing = true;
    playBtn.textContent = '⏸';
    const tick = () => {
      stepNext();
      if (playing && idx < visibleEvents.length - 1) {
        timer = setTimeout(tick, delay());
      } else {
        pause();
      }
    };
    stepNext();
    if (playing && idx < visibleEvents.length - 1) {
      timer = setTimeout(tick, delay());
    } else {
      pause();
    }
  }
  function pause() {
    playing = false;
    playBtn.textContent = '▶';
    if (timer) { clearTimeout(timer); timer = null; }
  }

  // Reorder events so each message-question is followed by its reply and each
  // task dispatch is followed by its completion. Unpaired events keep their
  // relative order. Greedy — an A→B message pairs with the NEXT unpaired B→A
  // message; an assign pairs with the next unpaired done mentioning the same
  // task_id. Broadcasts (one-way messages with no reply) stay in place.
  function pairEvents(src) {
    const taken = new Set();
    const out = [];
    const taskIdRe = /\b(t_\d+)\b/;
    const taskIdOf = (e) => {
      const m = taskIdRe.exec(e.label || '');
      return m ? m[1] : null;
    };
    function findReply(i) {
      const e = src[i];
      if (e.kind === 'msg') {
        for (let j = i + 1; j < src.length; j++) {
          if (taken.has(j)) continue;
          const f = src[j];
          if (f.kind === 'msg' && f.from === e.to && f.to === e.from) return j;
        }
      } else if (e.kind === 'assign') {
        const tid = taskIdOf(e);
        if (!tid) return -1;
        for (let j = i + 1; j < src.length; j++) {
          if (taken.has(j)) continue;
          const f = src[j];
          if ((f.kind === 'done' || f.kind === 'failed') && taskIdOf(f) === tid) return j;
        }
      }
      return -1;
    }
    for (let i = 0; i < src.length; i++) {
      if (taken.has(i)) continue;
      out.push(src[i]);
      taken.add(i);
      const r = findReply(i);
      if (r !== -1) {
        out.push(src[r]);
        taken.add(r);
      }
    }
    return out;
  }

  function rebuildVisible() {
    pause();
    const humanOnly = !!(humanEl && humanEl.checked);
    const paired    = !!(pairedEl && pairedEl.checked);
    let pool = humanOnly
      ? events.filter(e => e.kind === 'msg')
      : events.slice();
    if (paired) pool = pairEvents(pool);
    visibleEvents = pool;
    buildLogEntries();
    scrubEl.max = String(visibleEvents.length);
    if (humanLabel) humanLabel.classList.toggle('on', humanOnly);
    if (pairedLabel) pairedLabel.classList.toggle('on', paired);
    setTo(-1);
  }

  playBtn.addEventListener('click',     () => playing ? pause() : play());
  nextBtn.addEventListener('click',     () => { pause(); stepNext(); });
  backBtn.addEventListener('click',     () => { pause(); stepBack(); });
  document.getElementById('btn-reset').addEventListener('click',
    () => { pause(); setTo(-1); });
  document.getElementById('btn-end').addEventListener('click',
    () => { pause(); setTo(visibleEvents.length - 1); });
  scrubEl.addEventListener('input', (ev) => {
    pause();
    setTo(parseInt(ev.target.value, 10) - 1);
  });
  if (humanEl) humanEl.addEventListener('change', rebuildVisible);
  if (pairedEl) pairedEl.addEventListener('change', rebuildVisible);
  document.addEventListener('keydown', (ev) => {
    if (ev.target && /INPUT|SELECT|TEXTAREA/.test(ev.target.tagName)) return;
    if (ev.key === ' ' || ev.key === 'Enter') { ev.preventDefault(); playing ? pause() : play(); }
    else if (ev.key === 'ArrowRight') { ev.preventDefault(); pause(); stepNext(); }
    else if (ev.key === 'ArrowLeft')  { ev.preventDefault(); pause(); stepBack(); }
    else if (ev.key === 'Home')       { ev.preventDefault(); pause(); setTo(-1); }
    else if (ev.key === 'End')        { ev.preventDefault(); pause(); setTo(visibleEvents.length - 1); }
  });

  rebuildVisible();
})();
</script>
</body>
</html>
