<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      /* Color Variables */
      --color-bg-primary: #f5f1ed;
      --color-surface: #ffffff;
      --color-text-primary: #2a2520;
      --color-text-secondary: #6b6460;
      --color-accent: #c1441e;
      --color-border: #e8e3de;

      /* Typography Variables */
      --font-serif: Georgia, serif;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-size-title: 24px;
      --font-size-meta: 14px;
      --font-size-body: 16px;
      --line-height-tight: 1.2;
      --line-height-normal: 1.5;
      --line-height-relaxed: 1.6;

      /* Layout & Spacing Variables */
      --spacing-base: 8px;
      --card-max-width: 320px;
      --breakpoint-mobile: 768px;
    }
  </style>
</head>
<body>
  <!-- Header with search and filter -->
  <header class="app-header">
    <h1>Recipes</h1>
    <div class="controls">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="Search recipes..."
      >
      <select id="category-filter" class="category-filter">
        <option value="">All Categories</option>
        <option value="breakfast">Breakfast</option>
        <option value="main">Main</option>
        <option value="dessert">Dessert</option>
      </select>
    </div>
  </header>

  <!-- Recipe List -->
  <main>
    <div class="recipe-list" id="recipe-list">
      <!-- Recipe cards will be rendered here by JavaScript -->
    </div>
  </main>

  <!-- Recipe Detail Modal -->
  <div class="recipe-detail-modal" id="recipe-detail-modal" hidden>
    <div class="recipe-detail-modal__content">
      <!-- Close button -->
      <button class="recipe-detail-modal__close" id="modal-close-btn">×</button>

      <!-- Recipe title -->
      <h1 class="recipe-detail__title"></h1>

      <!-- Recipe metadata -->
      <div class="recipe-detail__meta">
        <span class="recipe-detail__time"></span>
        <span class="recipe-detail__servings"></span>
        <span class="recipe-detail__category"></span>
      </div>

      <!-- Description -->
      <p class="recipe-detail__description"></p>

      <!-- Ingredients section -->
      <section class="recipe-detail__ingredients-section">
        <h2 class="recipe-detail__ingredients-title">Ingredients</h2>
        <ul class="recipe-detail__ingredients-list"></ul>
      </section>

      <!-- Steps section -->
      <section class="recipe-detail__steps-section">
        <h2 class="recipe-detail__steps-title">Instructions</h2>
        <ol class="recipe-detail__steps-list"></ol>
      </section>

      <!-- Optional fields (difficulty, tags) -->
      <div class="recipe-detail__optional"></div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="data/recipes.js"></script>
  <script src="js/recipes.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
