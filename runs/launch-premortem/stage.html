nts. If behavior changed, users will see unexpected logouts mid-checkout and blame the platform. We need confirmation of what changed before Friday so we can brief agents and prepare a consistent user-facing message. Can you flag these for the checkout eng lead? Cheers.","from":"support","to":"engineer"},{"ts":"2026-04-23T04:08:36.245598+00:00","kind":"msg","label":"Engineer risks update: Several of my risks implicate on-call and rollback decision-making\u2026","full":"Engineer risks update: Several of my risks implicate on-call and rollback decision-making: 1. Redis session latency spike during Monday ramp (med/high likelihood, high impact) \u2014 single-node Redis under increased load could evict sessions or timeout, breaking checkouts 2. Idempotency-key enforcement breaks during flag transitions (med-high/high) \u2014 duplicate transactions could slip through audit log during ramp or rollback 3. Flag-off rollback encounters schema incompatibility (med/high) \u2014 v1 may not run against v2-migrated schema; rollback could fail partway 4. Ramp metrics lack stratification (high/med) \u2014 blended metrics hide v2 degradation; you won't have clear go/no-go signal for each ramp stage I'm proposing: load test Redis latency pre-ramp, build stratified metrics dashboard before Monday, and test rollback safety in staging. Lead is copied. Details in risks/engineer.md.","from":"engineer","to":"ops"},{"ts":"2026-04-23T04:08:37.249924+00:00","kind":"msg","label":"Hi \u2014 pre-mortem surfaces a structural risk with your feedback loop: **Feedback loop lag:*\u2026","full":"Hi \u2014 pre-mortem surfaces a structural risk with your feedback loop: **Feedback loop lag:** Historical pattern from past launches: tickets are the first signal of bugs. If the new coupon endpoint fails silently for edge cases or new checkout has subtle issues, support will see 'coupon didn't work' tickets before monitoring alerts. Without a structured escalation channel, ops doesn't notice the pattern until support manually pings Slack an hour later. Mitigation: Before Friday, agree on a threshold (e.g., 5+ tickets with same symptom in 1 hour) and commit to ops triaging within 15 min when support escalates. This keeps response time tight if there IS a real issue. Can you confirm you're ready for that protocol by Thursday? Thanks.","from":"support","to":"ops"},{"ts":"2026-04-23T04:08:38.357981+00:00","kind":"msg","label":"Engineer risks update: Three of my risks could drive user-facing pain: 1. Coupon endpoint\u2026","full":"Engineer risks update: Three of my risks could drive user-facing pain: 1. Coupon endpoint schema mismatch (med/high likelihood, high impact) \u2014 real production coupon codes/carts may fail in the new endpoint; users see 'discount won't apply' or checkout errors 2. Redis session latency spike (med/high, high impact) \u2014 session reads timeout under Monday ramp traffic; checkout failures increase 3. Idempotency enforcement gaps during flag transitions (med-high, high impact) \u2014 duplicate transaction handling breaks during ramp or rollback; potential for silent duplicate charges I'm proposing pre-ramp load testing and schema audits to surface these early. If they surface during ramp, you'll see error spikes in coupon apply logs and checkout timeout escalations. Lead is copied. Details in risks/engineer.md.","from":"engineer","to":"support"},{"ts":"2026-04-23T04:08:39.649958+00:00","kind":"msg","label":"Ops flagging three engineering concerns from the pre-mortem: 1. **New coupon endpoint ins\u2026","full":"Ops flagging three engineering concerns from the pre-mortem: 1. **New coupon endpoint instrumentation**: '/v2/coupons/apply' was added this week. It needs to be stress-tested before Friday and have the right instrumentation for monitoring (success rate, error types, latency breakdown). If metrics aren't available, ops can't see when it degrades during Monday ramp. 2. **Redis session store failover risk**: Single-node async replication is risky over a thin weekend. If it fails over Friday night to Sunday, the async window means data loss is possible. Recommend either (a) speed up the failover test and add alerts (ops does), or (b) switch to sync replication or multi-node for this launch period. 3. **Feature flag control plane failover**: The flag service is critical for the 0% \u2192 100% ramp. It needs a failover test Friday afternoon to verify behavior if the service goes down and to make sure on-call can force a rollback manually. I'm adding monitoring and runbook updates to cover ops side of these. But wanted you to see the gaps that touch your code/design.","from":"ops","to":"engineer"},{"ts":"2026-04-23T04:08:41.791417+00:00","kind":"msg","label":"Ops flagging a critical escalation pattern: our last two launches had 'silent degradation\u2026","full":"Ops flagging a critical escalation pattern: our last two launches had 'silent degradation' \u2014 no ops alerts fired, but customers noticed. The first signal was always a support-ticket volume spike 20\u201360 minutes after impact started. This launch adds a new coupon endpoint and a session-heavy v2 checkout flow. Errors to watch for on Monday: 'session expired,' 'invalid coupon,' 'payment method not found,' or checkout timeouts (>5 seconds). If you see a sudden spike in any checkout-related complaints Monday morning during the ramp, escalate immediately to #ops-checkout or page ops-primary. Don't wait for ops to notice \u2014 you'll see it before the dashboard does. I'm adding alerts to catch these earlier this time, but wanted to make sure you know the pattern and that support escalation is part of our early-signal plan.","from":"ops","to":"support"},{"ts":"2026-04-23T04:09:03.351845+00:00","kind":"done","label":"t_002 done \u2192 risks/ops.md","from":"ops","to":"lead"},{"ts":"2026-04-23T04:09:04.174600+00:00","kind":"done","label":"t_001 done \u2192 risks/engineer.md","from":"engineer","to":"lead"},{"ts":"2026-04-23T04:09:04.734095+00:00","kind" ne","label":"t_010 done \u2192 rollback_comms_plan.md","from":"support","to":"lead"},{"ts":"2026-04-23T04:12:53.669280+00:00","kind":"done","label":"t_004 done \u2192 audit_log_compliance_plan.md","from":"engineer","to":"lead"},{"ts":"2026-04-23T04:12:58.369836+00:00","kind":"msg","label":"Confirmed: Ops is ready for the support escalation protocol. Protocol: If you see 5+ tick\u2026","full":"Confirmed: Ops is ready for the support escalation protocol. Protocol: If you see 5+ tickets in 1 hour with the same symptom/keyword (e.g., 'coupon didn't apply,' 'session expired,' 'payment declined'), escalate immediately to #ops-escalation with format: '[PATTERN] symptom, N tickets in last 60 min, first 3 attached.' Ops commits to triaging within 15 minutes when escalated via this channel. This applies Friday evening through Monday. I've also drafted decision_authority.md (attached to PM) that clarifies the support-to-ops feedback loop as part of the 'silent degradation' early-signal strategy. You're the canary. When you escalate, ops will respond fast.","from":"ops","to":"support"},{"ts":"2026-04-23T04:13:00.854708+00:00","kind":"msg","label":"I've drafted decision_authority.md clarifying decision-making and escalation paths for Fr\u2026","full":"I've drafted decision_authority.md clarifying decision-making and escalation paths for Friday ship through Monday ramp conclusion. Key ops-to-eng moments: - If error rate/latency degrades during ramp, ops pages you immediately (no waiting). - You confirm if it's v2-specific using stratified metrics. - If confirmed v2 issue, ops escalates to PM. If you hit a schema mismatch during rollback testing, or detect idempotency-key duplicates during ramp, ops escalates to compliance/legal immediately (audit-log integrity is a blocker). Document will be shared Thursday with PM + lead. Your feedback welcome if you see gaps.","from":"ops","to":"engineer"},{"ts":"2026-04-23T04:13:03.005163+00:00","kind":"done","label":"t_005 done \u2192 decision_authority.md","from":"ops","to":"lead"},{"ts":"2026-04-23T04:15:21.373811+00:00","kind":"done","label":"t_006 done \u2192 consolidated_coupon_plan.md","from":"engineer","to":"lead"},{"ts":"2026-04-23T04:15:33.378288+00:00","kind":"msg","label":"I've drafted ramp_metrics_plan.md defining the stratified metrics dashboard, automated al\u2026","full":"I've drafted ramp_metrics_plan.md defining the stratified metrics dashboard, automated alerts, and go/no-go criteria for each ramp stage. Critical asks for you: 1. **Dashboard (7 panels):** Datadog dashboard with v1 vs v2 side-by-side for conversion, error rate, latency p50/p95/p99, coupon success, coupon latency, error breakdown, Redis health. Must be live by Friday morning. 2. **Metric instrumentation:** Confirm these metrics are available in your codebase: - 'checkout.error_rate{feature_flag: v2}' - 'checkout.latency_p99{feature_flag: v2}' - 'checkout.coupon_endpoint.error_rate' - 'redis.session_store.read_latency_p99' - 'redis.replication_lag_ms' 3. **Staging end-to-end test:** Friday afternoon, simulate 0%\u2192100% ramp in staging and verify dashboard populates correctly. Go/no-go criteria are in the document. Do these thresholds look reasonable to you, or should we adjust? Also: Can you confirm rollback test (v1 against v2-migrated schema) is in your load test plans for Friday?","from":"ops","to":"engineer"},{"ts":"2026-04-23T04:15:35.286810+00:00","kind":"msg","label":"One more thing on the plan: it assumes we have stratified metrics (v1 vs v2 separate, not\u2026","full":"One more thing on the plan: it assumes we have stratified metrics (v1 vs v2 separate, not blended). If your current instrumentation only reports blended metrics, we'll need to either: - Add feature-flag-aware instrumentation (split metrics by flag state) this week, OR - Use sampling/post-processing to infer v2-only metrics from logs Which is feasible? If neither, we need to escalate to PM/lead that we'll launch without clear go/no-go visibility, which changes the risk profile.","from":"ops","to":"engineer"},{"ts":"2026-04-23T04:15:39.383919+00:00","kind":"done","label":"t_007 done \u2192 ramp_metrics_plan.md","from":"ops","to":"lead"},{"ts":"2026-04-23T04:17:16.460298+00:00","kind":"done","label":"t_009 done \u2192 rollback_integrity_plan.md","from":"engineer","to":"lead"},{"ts":"2026-04-23T04:17:20.408555+00:00","kind":"msg","label":"I've finalized the support\u2192ops escalation protocol (support_ops_escalation_protocol.md).\u2026","full":"I've finalized the support\u2192ops escalation protocol (support_ops_escalation_protocol.md). **Friday morning briefing (REQUIRED):** - Time: Friday 2026-04-24 at 14:00 UTC (2 hours before ship) - Duration: 30 minutes - Attendees: All 6 support agents (including weekend staff), support lead, ops-secondary - Lead: Ops-primary (me) - Purpose: Train the team on the escalation threshold (5+ tickets with same keyword in 1 hour), channels (#ops-escalation + #checkout-launch-ops), format, and SLA (ops responds in 15 min) This is critical. The protocol makes support the early-signal system for ops during the launch. Without this briefing, support won't know to escalate, and ops will stay blind to customer issues for 30\u201360 min. **Can you confirm:** 1. All 6 support agents + weekend staff can attend Friday 14:00 UTC? 2. Which support lead should I coordinate with to schedule this and send the calendar invite? I'm also attaching a support-ready briefing agenda in the protocol doc so support lead can review and prep.","from":"ops","to":"support"},{"ts":"2026-04-23T04:17:23.433993+00:00","kind":"msg","label":"I've finalized the support\u2192ops escalation protocol. You are ops-secondary on-call Friday\u2026","full":"I've finalized the support\u2192ops escalation protocol. You are ops-secondary on-call Friday evening through Sunday. **Key responsibility:** If support escalates a [PATTERN] message to #ops-escalation and ops-primary (me) doesn't respond within 5 min, you assess whether it's urgent (check the ramp metrics dashboard) and either: 1. Reach out to ops-primary in Slack, or 2. If ops-primary is truly unreachable, post in #checkout-launch-ops and DM ops-primary's manager **You do NOT page engineer on-call.** Your role is to unblock ops-primary so they can make the decision. **Friday morning briefing (QUICK, 10 min):** - Time: Friday 14:00 UTC or 13:00 UTC (flexible) - Purpose: Cover your escalation procedure, response targets, and when to page ops-primary - Lead: Me I'll send the calendar invite Friday morning. Can you confirm you're available for a quick 10-min sync Friday morning (before ship at 16:00 UTC)? Also: Can you confirm that the ramp metrics dashboard will be ready by Friday morning so I can use it during weekend triage?","from":"ops","to":"engineer"},{"ts":"2026-04-23T04:17:25.490757+00:00","kind":"done","label":"t_008 done \u2192 support_ops_escalation_protocol.md","from":"ops","to":"lead"},{"ts":"2026-04-23T04:19:56.774468+00:00","kind":"note","label":"finalize()","who":"lead"}]}</script>

    backend:  { emoji: '👨\u200D💻', role: 'backend' },
    frontend: { emoji: '👩\u200D💻', role: 'frontend' },
    qa:       { emoji: '🧑\u200D🔬', role: 'qa' },
    design:   { emoji: '🧑\u200D🎨', role: 'design' },
  };
  const FALLBACK_AVATAR = { emoji: '👤', role: '' };
  const meta = (a) => AVATAR[a] || { emoji: FALLBACK_AVATAR.emoji, role: a };

  // ---- Stage layout ----
  const STAGE_W = 1320;
  const STAGE_H = 520;
  const FLOOR_Y = 420;
  const HEAD_Y  = 360;  // rough y where bubble tail should touch
  const LEFT_MARGIN = 80;
  const RIGHT_MARGIN = 80;
  const span = STAGE_W - LEFT_MARGIN - RIGHT_MARGIN;
  const n = Math.max(1, agents.length);
  const positions = {};
  agents.forEach((a, i) => {
    const x = LEFT_MARGIN + (n === 1 ? span/2 : (span * i / (n - 1)));
    positions[a] = { x, headY: HEAD_Y, footY: FLOOR_Y };
  });
  const posOf = (a) => positions[a] || {
    x: STAGE_W - RIGHT_MARGIN / 2, headY: HEAD_Y, footY: FLOOR_Y
  };

  // ---- Build the stage SVG ----
  const stageDiv = document.getElementById('stage');
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${STAGE_W} ${STAGE_H}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  // Arrow markers
  const defs = document.createElementNS(SVG_NS, 'defs');
  const mk = (id, color) => `
    <marker id="${id}" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="${color}"/>
    </marker>`;
  defs.innerHTML =
    mk('mkMsg',    '#22d3ee') +
    mk('mkAssign', '#60a5fa') +
    mk('mkDone',   '#4ade80') +
    mk('mkFailed', '#f87171');
  svg.appendChild(defs);

  // Floor
  const floor = document.createElementNS(SVG_NS, 'rect');
  floor.setAttribute('x', 0);
  floor.setAttribute('y', FLOOR_Y + 40);
  floor.setAttribute('width', STAGE_W);
  floor.setAttribute('height', STAGE_H - (FLOOR_Y + 40));
  floor.setAttribute('class', 'floor');
  svg.appendChild(floor);

  const floorLine = document.createElementNS(SVG_NS, 'line');
  floorLine.setAttribute('x1', 20);
  floorLine.setAttribute('x2', STAGE_W - 20);
  floorLine.setAttribute('y1', FLOOR_Y + 40);
  floorLine.setAttribute('y2', FLOOR_Y + 40);
  floorLine.setAttribute('class', 'floor-line');
  svg.appendChild(floorLine);

  // Avatars (the cast)
  const avatarEls = {};
  const nameEls = {};
  agents.forEach((a) => {
    const p = posOf(a);
    const m = meta(a);
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('transform', `translate(${p.x}, ${p.footY})`);
    g.setAttribute('data-agent', a);

    const avatar = document.createElementNS(SVG_NS, 'text');
    avatar.setAttribute('class', 'avatar');
    avatar.setAttribute('x', 0);
    avatar.setAttribute('y', -10);
    avatar.textContent = m.emoji;
    g.appendChild(avatar);

    const name = document.createElementNS(SVG_NS, 'text');
    name.setAttribute('class', 'agent-name');
    name.setAttribute('x', 0);
    name.setAttribute('y', 64);
    name.textContent = a;
    g.appendChild(name);

    if (m.role) {
      const role = document.createElementNS(SVG_NS, 'text');
      role.setAttribute('class', 'agent-role');
      role.setAttribute('x', 0);
      role.setAttribute('y', 80);
      role.textContent = m.role;
      g.appendChild(role);
    }

    svg.appendChild(g);
    avatarEls[a] = avatar;
    nameEls[a] = name;

    // Stagger idle animations so the cast doesn't bob in unison
    const stagger = (Math.abs(a.charCodeAt(0) + a.length) % 4) * 0.5;
    avatar.style.animationDelay = stagger + 's';
  });

  // Arrow layer (under bubbles) and bubble layer
  const arrowLayer = document.createElementNS(SVG_NS, 'g');
  arrowLayer.setAttribute('class', 'arrow-layer');
  svg.appendChild(arrowLayer);
  const bubbleLayer = document.createElementNS(SVG_NS, 'g');
  bubbleLayer.setAttribute('class', 'bubble-layer');
  svg.appendChild(bubbleLayer);

  stageDiv.appendChild(svg);

  // ---- Bubble + arrow renderers ----
  let currentBubble = null;
  let currentArrow = null;
  let reactionTimer = null;

  function clearStageFX() {
    if (currentBubble) { currentBubble.remove(); currentBubble = null; }
    if (currentArrow)  { currentArrow.remove();  currentArrow = null; }
    if (reactionTimer) { clearTimeout(reactionTimer); reactionTimer = null; }
    // Remove lingering CSS animation classes
    Object.values(avatarEls).forEach(a => {
      a.classList.remove('speaking');
      a.classList.remove('listening');
    });
    Object.entries(nameEls).forEach(([k, el]) => el.classList.remove('active'));
  }

  function drawBubble(who, text, kind) {
    const p = posOf(who);
    // Bubble sizing: width scales with text until 520px, then we wrap.
    // Height is derived from the estimated wrapped row count.
    const len = text.length;
    const W = Math.min(520, Math.max(180, len * 6.8 + 36));
    const approxCharsPerRow = Math.max(18, Math.floor((W - 28) / 7.2));
    const rows = Math.max(1, Math.ceil(len / approxCharsPerRow));
    const H = Math.min(240, 44 + rows * 20);
    const cx = p.x;
    // Anchor the bubble BOTTOM ~30px above the head so the tail tip
    // sits just above it regardless of how tall the bubble grows.
    const baseY = p.headY - 30;
    // Clamp x so bubble doesn't run off either edge
    const minCx = W / 2 + 12;
    const maxCx = STAGE_W - W / 2 - 12;
    const anchorX = Math.max(minCx, Math.min(maxCx, cx));

    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('class', 'bubble');
    g.setAttribute('transform', `translate(${anchorX}, ${baseY})`);

    const rect = document.createElementNS(SVG_NS, 'rect');
    rect.setAttribute('x', -W / 2);
    rect.setAttribute('y', -H);
    rect.setAttribute('width', W);
    rect.setAttribute('height', H);
    rect.setAttribute('rx', 12);
    rect.setAttribute('class', 'bubble-bg ' + kind);
    g.appendChild(rect);

    // Tail points from bubble down to speaker's head
    const tailBaseX = Math.max(-W / 2 + 14,
                               Math.min(W / 2 - 14, cx - anchorX));
    const tailPath = document.createElementNS(SVG_NS, 'polygon');
    tailPath.setAttribute('points',
      `${tailBaseX - 9},0 ${tailBaseX + 9},0 ${tailBaseX},22`);
    tailPath.setAttribute('class', 'bubble-tail ' + (kind === 'note' ? 'note' : ''));
    g.appendChild(tailPath);

    // Tail outline: two short lines to fake a border on just the sides of the tail
    const leftLine = document.createElementNS(SVG_NS, 'line');
    leftLine.setAttribute('x1', tailBaseX - 9);
    leftLine.setAttribute('y1', 0);
    leftLine.setAttribute('x2', tailBaseX);
    leftLine.setAttribute('y2', 22);
    leftLine.setAttribute('stroke', rect.style.stroke || '');
    g.appendChild(leftLine);

    // Sender tag (small "from:" label inside the bubble)
    const from = document.createElementNS(SVG_NS, 'text');
    from.setAttribute('class', 'bubble-from');
    from.setAttribute('x', -W / 2 + 10);
    from.setAttribute('y', -H + 14);
    from.textContent = who;
    g.appendChild(from);

    // Body text via foreignObject so it wraps
    const fo = document.createElementNS(SVG_NS, 'foreignObject');
    fo.setAttribute('x', -W / 2 + 10);
    fo.setAttribute('y', -H + 18);
    fo.setAttribute('width', W - 20);
    fo.setAttribute('height', H - 22);
    const body = document.createElementNS(XHTML_NS, 'div');
    body.setAttribute('class', 'bubble-text');
    body.textContent = text;
    fo.appendChild(body);
    g.appendChild(fo);

    bubbleLayer.appendChild(g);
    // Trigger CSS transition
    requestAnimationFrame(() => g.classList.add('show'));
    return g;
  }

  function drawArrow(from, to, kind) {
    if (!from || !to || from === to) return null;
    const a = posOf(from);
    const b = posOf(to);
    // Curve upward over the heads
    const midX = (a.x + b.x) / 2;
    const midY = Math.min(a.headY, b.headY) - 70;
    const dir = b.x >= a.x ? 1 : -1;
    const startX = a.x + 32 * dir;
    const endX   = b.x - 28 * dir;
    const startY = a.headY - 20;
    const endY   = b.headY - 20;
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d',
      `M ${startX} ${startY} Q ${midX} ${midY} ${endX} ${endY}`);
    path.setAttribute('class', 'arrow ' + kind);
    const marker =
      kind === 'done'   ? 'mkDone' :
      kind === 'failed' ? 'mkFailed' :
      kind === 'assign' ? 'mkAssign' : 'mkMsg';
    path.setAttribute('marker-end', `url(#${marker})`);
    arrowLayer.appendChild(path);
    requestAnimationFrame(() => path.classList.add('show'));
    return path;
  }

  function reactSpeaker(who) {
    const a = avatarEls[who];
    if (!a) return;
    a.classList.remove('speaking');
    // force reflow so the animation restarts
    void a.getBoundingClientRect();
    a.classList.add('speaking');
    if (nameEls[who]) nameEls[who].classList.add('active');
  }
  function reactListener(who) {
    const a = avatarEls[who];
    if (!a) return;
    a.classList.remove('listening');
    void a.getBoundingClientRect();
    a.classList.add('listening');
    if (nameEls[who]) nameEls[who].classList.add('active');
  }

  function renderEvent(e) {
    if (!e) return;
    const kind = e.kind;
    const body = (e.full && e.full.length > 0) ? e.full : (e.label || '');
    if (kind === 'note') {
      currentBubble = drawBubble(e.who, body, 'note');
      reactSpeaker(e.who);
    } else {
      currentBubble = drawBubble(e.from, body, kind);
      currentArrow = drawArrow(e.from, e.to, kind);
      reactSpeaker(e.from);
      reactionTimer = setTimeout(() => reactListener(e.to), 350);
    }
  }

  // ---- Filter: "Human only" keeps only peer-to-peer `msg` events. ----
  let visibleEvents = events.slice();
  let logEntries = [];

  function buildLogEntries() {
    logEntries = visibleEvents.map((e, i) => {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.idx = String(i);
      const tag = document.createElement('span');
      tag.className = 'tag ' + e.kind;
      tag.textContent = e.kind;
      div.appendChild(tag);
      const who = document.createElement('span');
      who.className = 'who';
      who.textContent = e.kind === 'note' ? (e.who || '?') : (e.from || '?');
      div.appendChild(who);
      const sep = document.createElement('span');
      if (e.kind === 'note') {
        sep.textContent = ' · ';
        div.appendChild(sep);
      } else {
        sep.textContent = ' → ';
        const to = document.createElement('span');
        to.className = 'to';
        to.textContent = e.to || '?';
        div.appendChild(sep);
        div.appendChild(to);
        const colon = document.createElement('span');
        colon.textContent = ': ';
        div.appendChild(colon);
      }
      const body = document.createElement('span');
      body.textContent = (e.full && e.full.length > 0) ? e.full : (e.label || '');
      div.appendChild(body);
      return div;
    });
  }

  // ---- Subtitle log ----
  const logEl = document.getElementById('log');

  function renderLog(upTo) {
    // upTo = index of last visible entry in `visibleEvents`; -1 = empty
    logEl.innerHTML = '';
    for (let i = 0; i <= upTo; i++) {
      const entry = logEntries[i];
      if (!entry) continue;
      entry.classList.toggle('current', i === upTo);
      logEl.appendChild(entry);
    }
    if (upTo >= 0 && logEntries[upTo]) {
      logEntries[upTo].scrollIntoView({block: 'nearest', behavior: 'smooth'});
    }
  }

  // ---- Playback controls ----
  let idx = -1;
  let playing = false;
  let timer = null;
  const BASE_DELAY = 2000; // ms/event at 1x
  const speedEl = document.getElementById('speed');
  const scrubEl = document.getElementById('scrubber');
  const progEl  = document.getElementById('progress');
  const playBtn = document.getElementById('btn-play');
  const backBtn = document.getElementById('btn-back');
  const nextBtn = document.getElementById('btn-next');
  const humanEl = document.getElementById('human-only');
  const humanLabel = document.getElementById('human-only-label');
  const pairedEl = document.getElementById('paired');
  const pairedLabel = document.getElementById('paired-label');

  const delay = () => BASE_DELAY / parseFloat(speedEl.value || '1');

  function updateProgress() {
    const n = idx + 1;
    progEl.textContent = n + ' / ' + visibleEvents.length;
    scrubEl.value = String(n);
    backBtn.disabled = idx < 0;
    nextBtn.disabled = idx >= visibleEvents.length - 1;
  }
  function setTo(i) {
    idx = Math.max(-1, Math.min(visibleEvents.length - 1, i));
    clearStageFX();
    if (idx >= 0) renderEvent(visibleEvents[idx]);
    renderLog(idx);
    updateProgress();
  }
  function stepNext() {
    if (idx >= visibleEvents.length - 1) { pause(); return; }
    setTo(idx + 1);
  }
  function stepBack() {
    if (idx < 0) return;
    setTo(idx - 1);
  }
  function play() {
    if (idx >= visibleEvents.length - 1) setTo(-1);
    playing = true;
    playBtn.textContent = '⏸';
    const tick = () => {
      stepNext();
      if (playing && idx < visibleEvents.length - 1) {
        timer = setTimeout(tick, delay());
      } else {
        pause();
      }
    };
    stepNext();
    if (playing && idx < visibleEvents.length - 1) {
      timer = setTimeout(tick, delay());
    } else {
      pause();
    }
  }
  function pause() {
    playing = false;
    playBtn.textContent = '▶';
    if (timer) { clearTimeout(timer); timer = null; }
  }

  // Reorder events so each message-question is followed by its reply and each
  // task dispatch is followed by its completion. Unpaired events keep their
  // relative order. Greedy — an A→B message pairs with the NEXT unpaired B→A
  // message; an assign pairs with the next unpaired done mentioning the same
  // task_id. Broadcasts (one-way messages with no reply) stay in place.
  function pairEvents(src) {
    const taken = new Set();
    const out = [];
    const taskIdRe = /\b(t_\d+)\b/;
    const taskIdOf = (e) => {
      const m = taskIdRe.exec(e.label || '');
      return m ? m[1] : null;
    };
    function findReply(i) {
      const e = src[i];
      if (e.kind === 'msg') {
        for (let j = i + 1; j < src.length; j++) {
          if (taken.has(j)) continue;
          const f = src[j];
          if (f.kind === 'msg' && f.from === e.to && f.to === e.from) return j;
        }
      } else if (e.kind === 'assign') {
        const tid = taskIdOf(e);
        if (!tid) return -1;
        for (let j = i + 1; j < src.length; j++) {
          if (taken.has(j)) continue;
          const f = src[j];
          if ((f.kind === 'done' || f.kind === 'failed') && taskIdOf(f) === tid) return j;
        }
      }
      return -1;
    }
    for (let i = 0; i < src.length; i++) {
      if (taken.has(i)) continue;
      out.push(src[i]);
      taken.add(i);
      const r = findReply(i);
      if (r !== -1) {
        out.push(src[r]);
        taken.add(r);
      }
    }
    return out;
  }

  function rebuildVisible() {
    pause();
    const humanOnly = !!(humanEl && humanEl.checked);
    const paired    = !!(pairedEl && pairedEl.checked);
    let pool = humanOnly
      ? events.filter(e => e.kind === 'msg')
      : events.slice();
    if (paired) pool = pairEvents(pool);
    visibleEvents = pool;
    buildLogEntries();
    scrubEl.max = String(visibleEvents.length);
    if (humanLabel) humanLabel.classList.toggle('on', humanOnly);
    if (pairedLabel) pairedLabel.classList.toggle('on', paired);
    setTo(-1);
  }

  playBtn.addEventListener('click',     () => playing ? pause() : play());
  nextBtn.addEventListener('click',     () => { pause(); stepNext(); });
  backBtn.addEventListener('click',     () => { pause(); stepBack(); });
  document.getElementById('btn-reset').addEventListener('click',
    () => { pause(); setTo(-1); });
  document.getElementById('btn-end').addEventListener('click',
    () => { pause(); setTo(visibleEvents.length - 1); });
  scrubEl.addEventListener('input', (ev) => {
    pause();
    setTo(parseInt(ev.target.value, 10) - 1);
  });
  if (humanEl) humanEl.addEventListener('change', rebuildVisible);
  if (pairedEl) pairedEl.addEventListener('change', rebuildVisible);
  document.addEventListener('keydown', (ev) => {
    if (ev.target && /INPUT|SELECT|TEXTAREA/.test(ev.target.tagName)) return;
    if (ev.key === ' ' || ev.key === 'Enter') { ev.preventDefault(); playing ? pause() : play(); }
    else if (ev.key === 'ArrowRight') { ev.preventDefault(); pause(); stepNext(); }
    else if (ev.key === 'ArrowLeft')  { ev.preventDefault(); pause(); stepBack(); }
    else if (ev.key === 'Home')       { ev.preventDefault(); pause(); setTo(-1); }
    else if (ev.key === 'End')        { ev.preventDefault(); pause(); setTo(visibleEvents.length - 1); }
  });

  rebuildVisible();
})();
</script>
</body>
</html>
