n_authority.md","from":"ops","to":"lead"},{"ts":"2026-04-23T04:15:21.373811+00:00","kind":"done","label":"t_006 done \u2192 consolidated_coupon_plan.md","from":"engineer","to":"lead"},{"ts":"2026-04-23T04:15:33.378288+00:00","kind":"msg","label":"I've drafted ramp_metrics_plan.md defining the stratified metrics dashboard, automated al\u2026","full":"I've drafted ramp_metrics_plan.md defining the stratified metrics dashboard, automated alerts, and go/no-go criteria for each ramp stage. Critical asks for you: 1. **Dashboard (7 panels):** Datadog dashboard with v1 vs v2 side-by-side for conversion, error rate, latency p50/p95/p99, coupon success, coupon latency, error breakdown, Redis health. Must be live by Friday morning. 2. **Metric instrumentation:** Confirm these metrics are available in your codebase: - 'checkout.error_rate{feature_flag: v2}' - 'checkout.latency_p99{feature_flag: v2}' - 'checkout.coupon_endpoint.error_rate' - 'redis.session_store.read_latency_p99' - 'redis.replication_lag_ms' 3. **Staging end-to-end test:** Friday afternoon, simulate 0%\u2192100% ramp in staging and verify dashboard populates correctly. Go/no-go criteria are in the document. Do these thresholds look reasonable to you, or should we adjust? Also: Can you confirm rollback test (v1 against v2-migrated schema) is in your load test plans for Friday?","from":"ops","to":"engineer"},{"ts":"2026-04-23T04:15:35.286810+00:00","kind":"msg","label":"One more thing on the plan: it assumes we have stratified metrics (v1 vs v2 separate, not\u2026","full":"One more thing on the plan: it assumes we have stratified metrics (v1 vs v2 separate, not blended). If your current instrumentation only reports blended metrics, we'll need to either: - Add feature-flag-aware instrumentation (split metrics by flag state) this week, OR - Use sampling/post-processing to infer v2-only metrics from logs Which is feasible? If neither, we need to escalate to PM/lead that we'll launch without clear go/no-go visibility, hether it's urgent (check the ramp metrics dashboard) and either: 1. Reach out to ops-primary in Slack, or 2. If ops-primary is truly unreachable, post in #checkout-launch-ops and DM ops-primary's manager **You do NOT page engineer on-call.** Your role is to unblock ops-primary so they can make the decision. **Friday morning briefing (QUICK, 10 min):** - Time: Friday 14:00 UTC or 13:00 UTC (flexible) - Purpose: Cover your escalation procedure, response targets, and when to page ops-primary - Lead: Me I'll send the calendar invite Friday morning. Can you confirm you're available for a quick 10-min sync Friday morning (before ship at 16:00 UTC)? Also: Can you confirm that the ramp metrics dashboard will be ready by Friday morning so I can use it during weekend triage?","from":"ops","to":"engineer"},{"ts":"2026-04-23T04:17:25.490757+00:00","kind":"done","label":"t_008 done \u2192 support_ops_escalation_protocol.md","from":"ops","to":"lead"},{"ts":"2026-04-23T04:19:56.774468+00:00","kind":"note","label":"finalize()","who":"lead"}]}</script>
<script>
(() => {
  'use strict';
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const data = JSON.parse(document.getElementById('data').textContent);
  const agents = data.agents;
  const events = data.events;

  // Layout
  const COL_W = 210;
  const LEFT_PAD = 32;
  const RIGHT_PAD = 32;
  const TOP_PAD = 56;
  const BOTTOM_PAD = 32;
  const ROW_H = 58;

  const svgW = LEFT_PAD + RIGHT_PAD + Math.max(1, agents.length) * COL_W;
  const svgH = TOP_PAD + Math.max(1, events.length) * ROW_H + BOTTOM_PAD;

  const xForAgent = (name) => {
    const i = agents.indexOf(name);
    const idx = i < 0 ? agents.length : i;
    return LEFT_PAD + idx * COL_W + COL_W / 2;
  };
  const yForEvent = (i) => TOP_PAD + i * ROW_H + ROW_H / 2;

  const stage = document.getElementById('stage');
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.setAttribute('width', svgW);
  svg.setAttribute('preserveAspectRatio', 'xMinYMin meet');

  // Arrow markers
  const defs = document.createElementNS(SVG_NS, 'defs');
  const mk = (id, color) => `
    <marker id="${id}" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="${color}"/>
    </marker>`;
  defs.innerHTML =
    mk('mk-blue',  '#2563eb') +
    mk('mk-green', '#16a34a') +
    mk('mk-red',   '#dc2626') +
    mk('mk-cyan',  '#0891b2');
  svg.appendChild(defs);

  // Lane labels + vertical lifelines
  agents.forEach((a) => {
    const x = xForAgent(a);
    const label = document.createElementNS(SVG_NS, 'text');
    label.setAttribute('x', x);
    label.setAttribute('y', 28);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('class', 'lane-label');
    label.textContent = a;
    svg.appendChild(label);

    const line = document.createElementNS(SVG_NS, 'line');
    line.setAttribute('x1', x);
    line.setAttribute('y1', 40);
    line.setAttribute('x2', x);
    line.setAttribute('y2', svgH - BOTTOM_PAD);
    line.setAttribute('class', 'lane-line');
    svg.appendChild(line);
  });

  // Now-line (sweeps down as playback advances)
  const nowLine = document.createElementNS(SVG_NS, 'line');
  nowLine.setAttribute('x1', LEFT_PAD);
  nowLine.setAttribute('x2', svgW - RIGHT_PAD);
  nowLine.setAttribute('y1', TOP_PAD - 8);
  nowLine.setAttribute('y2', TOP_PAD - 8);
  nowLine.setAttribute('class', 'now-line');
  nowLine.setAttribute('opacity', '0');
  svg.appendChild(nowLine);

  // Pre-render every event element (hidden initially)
  const elements = events.map((e, i) => {
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('class', 'event hidden');
    g.setAttribute('data-idx', String(i));

    const y = yForEvent(i);

    if (e.kind === 'note') {
      const who = e.who || 'lead';
      const x = xForAgent(who);
      const text = e.label || '';
      const width = Math.min(COL_W - 20, Math.max(120, text.length * 6.5 + 20));
      const height = 26;
      const rect = document.createElementNS(SVG_NS, 'rect');
      rect.setAttribute('x', x - width / 2);
      rect.setAttribute('y', y - height / 2);
      rect.setAttribute('width', width);
      rect.setAttribute('height', height);
      rect.setAttribute('rx', 4);
      rect.setAttribute('class', 'note-bg');
      g.appendChild(rect);

      const t = document.createElementNS(SVG_NS, 'text');
      t.setAttribute('x', x);
      t.setAttribute('y', y + 4);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('class', 'note-text');
      t.textContent = text;
      g.appendChild(t);

      const full = document.createElementNS(SVG_NS, 'title');
      full.textContent = text;
      g.appendChild(full);
    } else {
      const x1 = xForAgent(e.from);
      const x2 = xForAgent(e.to);
      const arrowCls =
        e.kind === 'done' ? 'arrow dashed' :
        e.kind === 'failed' ? 'arrow failed' :
        e.kind === 'msg' ? 'arrow msg' : 'arrow solid';
      const marker =
        e.kind === 'done' ? 'mk-green' :
        e.kind === 'failed' ? 'mk-red' :
        e.kind === 'msg' ? 'mk-cyan' : 'mk-blue';

      // Arrow path. Slight vertical offset at src/dst so a later bubble
      // below doesn't sit on the line.
      const path = document.createElementNS(SVG_NS, 'path');
      const dir = x2 > x1 ? 1 : -1;
      const pad = 8 * dir;
      path.setAttribute('d', `M ${x1 + pad} ${y} L ${x2 - pad} ${y}`);
      path.setAttribute('class', arrowCls);
      path.setAttribute('marker-end', `url(#${marker})`);
      path.setAttribute('pathLength', '100');
      if (e.kind === 'done') {
        // keep dashed look, but still animate via dashoffset on a wrapper
        path.setAttribute('stroke-dasharray', '6 4');
      } else if (e.kind === 'failed') {
        path.setAttribute('stroke-dasharray', '2 3');
      } else {
        path.setAttribute('stroke-dasharray', '100');
        path.setAttribute('stroke-dashoffset', '100');
        path.style.transition = 'stroke-dashoffset 0.45s ease-out';
      }
      g.appendChild(path);

      // Bubble with truncated label above the arrow
      const label = (e.label || '').slice(0, 110);
      if (label) {
        const midX = (x1 + x2) / 2;
        const bubbleY = y - 18;
        const w = Math.min(Math.abs(x2 - x1) - 30, label.length * 6.2 + 16);
        const bw = Math.max(60, w);
        const h = 18;
        const rect = document.createElementNS(SVG_NS, 'rect');
        rect.setAttribute('x', midX - bw / 2);
        rect.setAttribute('y', bubbleY - h / 2);
        rect.setAttribute('width', bw);
        rect.setAttribute('height', h);
        rect.setAttribute('rx', 3);
        rect.setAttribute('class', 'bubble-bg ' + (e.kind || 'msg'));
        g.appendChild(rect);

        const t = document.createElementNS(SVG_NS, 'text');
        t.setAttribute('x', midX);
        t.setAttribute('y', bubbleY + 4);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('class', 'bubble-text');
        t.textContent = label;
        g.appendChild(t);
      }

      const full = document.createElementNS(SVG_NS, 'title');
      full.textContent =
        (e.from || '?') + ' → ' + (e.to || '?') + ' [' + e.kind + ']\n' +
        (e.label || '');
      g.appendChild(full);
    }

    svg.appendChild(g);
    return g;
  });

  stage.appendChild(svg);

  // Playback state
  let idx = -1;                 // index of the last revealed event; -1 = nothing
  let playing = false;
  let timer = null;
  const BASE_DELAY = 850;       // ms/event at 1x
  const speedEl = document.getElementById('speed');
  const scrubEl = document.getElementById('scrubber');
  const progEl  = document.getElementById('progress');
  const playBtn = document.getElementById('btn-play');
  const backBtn = document.getElementById('btn-back');
  const nextBtn = document.getElementById('btn-next');
  const resetBtn = document.getElementById('btn-reset');
  const endBtn = document.getElementById('btn-end');
  scrubEl.max = String(events.length);

  const delay = () => BASE_DELAY / parseFloat(speedEl.value || '1');

  function reveal(i, instant) {
    const g = elements[i];
    if (!g) return;
    g.classList.remove('hidden');
    g.classList.add('visible');
    const path = g.querySelector('path');
    const dashed = path && path.getAttribute('stroke-dasharray') === '100';
    if (dashed) {
      if (instant) {
        path.style.transition = 'none';
        path.setAttribute('stroke-dashoffset', '0');
        // Re-enable transition for next time
        void path.getBoundingClientRect();
        path.style.transition = 'stroke-dashoffset 0.45s ease-out';
      } else {
        requestAnimationFrame(() =>
          path.setAttribute('stroke-dashoffset', '0'));
      }
    }
  }
  function hide(i) {
    const g = elements[i];
    if (!g) return;
    g.classList.remove('visible');
    g.classList.add('hidden');
    const path = g.querySelector('path');
    if (path && path.getAttribute('stroke-dasharray') === '100') {
      path.style.transition = 'none';
      path.setAttribute('stroke-dashoffset', '100');
      void path.getBoundingClientRect();
      path.style.transition = 'stroke-dashoffset 0.45s ease-out';
    }
  }

  function markCurrent() {
    elements.forEach((g, i) => {
      if (i === idx) g.classList.add('current');
      else g.classList.remove('current');
    });
    if (idx >= 0) {
      nowLine.setAttribute('opacity', '0.6');
      const y = yForEvent(idx);
      nowLine.setAttribute('y1', y);
      nowLine.setAttribute('y2', y);
      // Auto-scroll the element into view when we've passed below the fold
      const g = elements[idx];
      if (g && g.scrollIntoView) {
        const r = g.getBoundingClientRect();
        const inView = r.top >= 100 && r.bottom <= window.innerHeight - 20;
        if (!inView) g.scrollIntoView({block: 'center', behavior: 'smooth'});
      }
    } else {
      nowLine.setAttribute('opacity', '0');
    }
  }
  function updateProgress() {
    const n = idx + 1;
    progEl.textContent = n + ' / ' + events.length;
    scrubEl.value = String(n);
    backBtn.disabled = idx < 0;
    nextBtn.disabled = idx >= events.length - 1;
  }
  function setTo(n, instant) {
    // n = number of events revealed (0..events.length)
    const target = n - 1;
    if (target > idx) {
      for (let i = idx + 1; i <= target; i++) reveal(i, instant);
    } else if (target < idx) {
      for (let i = idx; i > target; i--) hide(i);
    }
    idx = target;
    markCurrent();
    updateProgress();
  }
  function stepNext() {
    if (idx >= events.length - 1) { pause(); return; }
    idx++;
    reveal(idx, false);
    markCurrent();
    updateProgress();
  }
  function stepBack() {
    if (idx < 0) return;
    hide(idx);
    idx--;
    markCurrent();
    updateProgress();
  }
  function play() {
    if (idx >= events.length - 1) setTo(0, true);
    playing = true;
    playBtn.textContent = '⏸';
    const tick = () => {
      stepNext();
      if (playing && idx < events.length - 1) {
        timer = setTimeout(tick, delay());
      } else {
        pause();
      }
    };
    timer = setTimeout(tick, delay());
  }
  function pause() {
    playing = false;
    playBtn.textContent = '▶';
    if (timer) { clearTimeout(timer); timer = null; }
  }

  playBtn.addEventListener('click', () => playing ? pause() : play());
  nextBtn.addEventListener('click', () => { pause(); stepNext(); });
  backBtn.addEventListener('click', () => { pause(); stepBack(); });
  resetBtn.addEventListener('click', () => { pause(); setTo(0, true); });
  endBtn.addEventListener('click',   () => { pause(); setTo(events.length, true); });
  scrubEl.addEventListener('input', (ev) => {
    pause(); setTo(parseInt(ev.target.value, 10), true);
  });
  document.addEventListener('keydown', (ev) => {
    if (ev.target && /INPUT|SELECT|TEXTAREA/.test(ev.target.tagName)) return;
    if (ev.key === ' ' || ev.key === 'Enter') { ev.preventDefault(); playing ? pause() : play(); }
    else if (ev.key === 'ArrowRight') { ev.preventDefault(); pause(); stepNext(); }
    else if (ev.key === 'ArrowLeft')  { ev.preventDefault(); pause(); stepBack(); }
    else if (ev.key === 'Home')       { ev.preventDefault(); pause(); setTo(0, true); }
    else if (ev.key === 'End')        { ev.preventDefault(); pause(); setTo(events.length, true); }
  });

  updateProgress();
  markCurrent();
})();
</script>
</body>
</html>
