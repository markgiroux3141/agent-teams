uish if the deploy broke validation or broke cache invalidation.","from":"observability","to":"sre"},{"ts":"2026-04-22T20:56:46.260515+00:00","kind":"done","label":"t_003 done \u2192 findings/releng.md","from":"releng","to":"lead"},{"ts":"2026-04-22T20:56:48.319953+00:00","kind":"done","label":"t_001 done \u2192 findings/sre.md","from":"sre","to":"lead"},{"ts":"2026-04-22T20:56:55.486751+00:00","kind":"msg","label":"Support confirms your session cycling hypothesis with ticket data. 38 of 47 tickets expli\u2026","full":"Support confirms your session cycling hypothesis with ticket data. 38 of 47 tickets explicitly report users logging in successfully, then being kicked out 2\u20135 minutes later, requiring re-login. Ticket #18422: 'logged in fine, added items, got session expired error, logged back in, worked for a couple minutes then kicked out again.' Ticket #18444: 'signed in, was fine for about 5 minutes, then got signed out again.' This directly matches your '/session/validate' 401 cycling pattern with 2\u20133 minute windows. The consistency across tickets strongly supports the hypothesis that session TTL was modified downward in the 14:01 deploy.","from":"support","to":"sre"},{"ts":"2026-04-22T20:56:56.656661+00:00","kind":"done","label":"t_002 done \u2192 findings/observability.md","from":"observability","to":"lead"},{"ts":"2026-04-22T20:56:57.018080+00:00","kind":"msg","label":"Support data implicates session behavior change in the 14:01 deploy. 81% of incident tick\u2026","full":"Support data implicates session behavior change in the 14:01 deploy. 81% of incident tickets report the same pattern: successful login, then session expiration every 2\u20135 minutes, requiring multiple re-authentications to complete checkout. This is not auth failure (users can login), but premature session invalidation. Critical question: did the 14:01 deploy modify session TTL configuration, session validation code, or any dependency that affects session lifecycle? The precision   const LEFT_PAD = 32;
  const RIGHT_PAD = 32;

  const BOTTOM_PAD = 32;
  const ROW_H = 58;

  const svgW = LEFT_PAD + RIGHT_PAD + Math.max(1, agents.length) * COL_W;
  const svgH = TOP_PAD + Math.max(1, events.length) * ROW_H + BOTTOM_PAD;

  const xForAgent = (name) => {
    const i = agents.indexOf(name);

  const yForEvent = (i) => TOP_PAD + i * ROW_H + ROW_H / 2;

  const stage = document.getElementById('stage');

  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.setAttribute('width', svgW);
  svg.setAttribute('preserveAspectRatio', 'xMinYMin meet');

  // Arrow markers
  const defs = document.createElementNS(SVG_NS, 'defs');
  const mk = (id, color) => `
    <marker id="${id}" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="${color}"/>

  defs.innerHTML =
    mk('mk-blue',  '#2563eb') +
    mk('mk-green', '#16a34a') +
    mk('mk-red',   '#dc2626') +
    mk('mk-cyan',  '#0891b2');
  svg.appendChild(defs);

  // Lane labels + vertical lifelines

      const full = document.createElementNS(SVG_NS, 'title');
      full.textContent =
        (e.from || '?') + ' → ' + (e.to || '?') + ' [' + e.kind + ']\n' +
        (e.label || '');
      g.appendChild(full);
    }

    svg.appendChild(g);
    return g;
  });

  stage.appendChild(svg);

  // Playback state
  let idx = -1;                 // index of the last revealed event; -1 = nothing
  let playing = false;
  let timer = null;
  const BASE_DELAY = 850;       // ms/event at 1x
  const speedEl = document.getElementById('speed');
  const scrubEl = document.getElementById('scrubber');
  const progEl  = document.getElementById('progress');
  const playBtn = document.getElementById('btn-play');
  const backBtn = document.getElementById('btn-back');
  const nextBtn = document.getElementById('btn-next');
  const resetBtn = document.getElementById('btn-reset');
  const endBtn = document.getElementById('btn-end');
  scrubEl.max = String(events.length);

  const delay = () => BASE_DELAY / parseFloat(speedEl.value || '1');

  function reveal(i, instant) {
    const g = elements[i];
    if (!g) return;
    g.classList.remove('hidden');
    g.classList.add('visible');
    const path = g.querySelector('path');
    const dashed = path && path.getAttribute('stroke-dasharray') === '100';
    if (dashed) {
      if (instant) {
        path.style.transition = 'none';
        path.setAttribute('stroke-dashoffset', '0');
        // Re-enable transition for next time
        void path.getBoundingClientRect();
        path.style.transition = 'stroke-dashoffset 0.45s ease-out';
      } else {
        requestAnimationFrame(() =>
          path.setAttribute('stroke-dashoffset', '0'));
      }
    }
  }
  function hide(i) {
    const g = elements[i];
    if (!g) return;
    g.classList.remove('visible');
    g.classList.add('hidden');
    const path = g.querySelector('path');
    if (path && path.getAttribute('stroke-dasharray') === '100') {
      path.style.transition = 'none';
      path.setAttribute('stroke-dashoffset', '100');
      void path.getBoundingClientRect();
      path.style.transition = 'stroke-dashoffset 0.45s ease-out';
    }
  }

  function markCurrent() {
    elements.forEach((g, i) => {
      if (i === idx) g.classList.add('current');
      else g.classList.remove('current');
    });
    if (idx >= 0) {
      nowLine.setAttribute('opacity', '0.6');
      const y = yForEvent(idx);
      nowLine.setAttribute('y1', y);
      nowLine.setAttribute('y2', y);
      // Auto-scroll the element into view when we've passed below the fold
      const g = elements[idx];
      if (g && g.scrollIntoView) {
        const r = g.getBoundingClientRect();
        const inView = r.top >= 100 && r.bottom <= window.innerHeight - 20;
        if (!inView) g.scrollIntoView({block: 'center', behavior: 'smooth'});
      }
    } else {
      nowLine.setAttribute('opacity', '0');
    }
  }
  function updateProgress() {
    const n = idx + 1;
    progEl.textContent = n + ' / ' + events.length;
    scrubEl.value = String(n);
    backBtn.disabled = idx < 0;
    nextBtn.disabled = idx >= events.length - 1;
  }
  function setTo(n, instant) {
    // n = number of events revealed (0..events.length)
    const target = n - 1;
    if (target > idx) {
      for (let i = idx + 1; i <= target; i++) reveal(i, instant);
    } else if (target < idx) {
      for (let i = idx; i > target; i--) hide(i);
    }
    idx = target;
    markCurrent();
    updateProgress();
  }
  function stepNext() {
    if (idx >= events.length - 1) { pause(); return; }
    idx++;
    reveal(idx, false);
    markCurrent();
    updateProgress();
  }
  function stepBack() {
    if (idx < 0) return;
    hide(idx);
    idx--;
    markCurrent();
    updateProgress();
  }
  function play() {
    if (idx >= events.length - 1) setTo(0, true);
    playing = true;
    playBtn.textContent = '⏸';
    const tick = () => {
      stepNext();
      if (playing && idx < events.length - 1) {
        timer = setTimeout(tick, delay());
      } else {
        pause();
      }
    };
    timer = setTimeout(tick, delay());
  }
  function pause() {
    playing = false;
    playBtn.textContent = '▶';
    if (timer) { clearTimeout(timer); timer = null; }
  }

  playBtn.addEventListener('click', () => playing ? pause() : play());
  nextBtn.addEventListener('click', () => { pause(); stepNext(); });
  backBtn.addEventListener('click', () => { pause(); stepBack(); });
  resetBtn.addEventListener('click', () => { pause(); setTo(0, true); });
  endBtn.addEventListener('click',   () => { pause(); setTo(events.length, true); });
  scrubEl.addEventListener('input', (ev) => {
    pause(); setTo(parseInt(ev.target.value, 10), true);
  });
  document.addEventListener('keydown', (ev) => {
    if (ev.target && /INPUT|SELECT|TEXTAREA/.test(ev.target.tagName)) return;
    if (ev.key === ' ' || ev.key === 'Enter') { ev.preventDefault(); playing ? pause() : play(); }
    else if (ev.key === 'ArrowRight') { ev.preventDefault(); pause(); stepNext(); }
    else if (ev.key === 'ArrowLeft')  { ev.preventDefault(); pause(); stepBack(); }
    else if (ev.key === 'Home')       { ev.preventDefault(); pause(); setTo(0, true); }
    else if (ev.key === 'End')        { ev.preventDefault(); pause(); setTo(events.length, true); }
  });

  updateProgress();
  markCurrent();
})();
</script>
</body>
</html>
