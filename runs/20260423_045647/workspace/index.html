<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Page Header -->
  <header class="rx-header">
    <h1 class="rx-title">Recipes</h1>
    <input id="search-input" type="text" placeholder="Search recipes..." class="rx-search-input" aria-label="Search recipes">
    <div class="rx-filter-buttons">
      <button class="rx-filter-button" data-category="breakfast" aria-pressed="false">Breakfast</button>
      <button class="rx-filter-button" data-category="main" aria-pressed="false">Main</button>
      <button class="rx-filter-button" data-category="dessert" aria-pressed="false">Dessert</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="rx-main">
    <!-- Recipe List Grid -->
    <div id="recipe-list" class="rx-recipe-list">
      <!-- Backend injects recipe cards here -->
    </div>

    <!-- Empty State (shown when no recipes match) -->
    <div id="empty-state" class="rx-empty-state" style="display: none;">
      No recipes found. Try adjusting your search or filters.
    </div>
  </main>

  <!-- Detail Modal -->
  <div id="recipe-detail" class="rx-detail-modal rx-detail-modal--hidden">
    <div class="rx-detail-content">
      <button id="detail-close" class="rx-detail-close" aria-label="Close recipe details">×</button>

      <h2 class="rx-detail-title"></h2>

      <div class="rx-detail-meta">
        <span class="rx-detail-time"></span>
        <span class="rx-detail-servings"></span>
        <span class="rx-detail-category"></span>
      </div>

      <p class="rx-detail-description"></p>

      <section class="rx-detail-section">
        <h3 class="rx-detail-heading">Ingredients</h3>
        <ul id="ingredients-list" class="rx-ingredients-list">
          <!-- Backend injects ingredients here -->
        </ul>
      </section>

      <section class="rx-detail-section">
        <h3 class="rx-detail-heading">Steps</h3>
        <ol id="steps-list" class="rx-steps-list">
          <!-- Backend injects steps here -->
        </ol>
      </section>

      <div id="detail-tags" class="rx-detail-tags" style="display: none;">
        <!-- Backend injects dietary tags and difficulty here -->
      </div>
    </div>
  </div>

  <!-- Recipes Data (embedded JSON) -->
  <script type="application/json" id="recipes-data">
[
  {
    "id": "fluffy-pancakes",

    "description": "Golden, tender pancakes with a crispy exterior. Perfect weekend breakfast that's easier than you'd think.",

    "ingredients": [
      "2 cups all-purpose flour",

    "steps": [
      "Whisk flour, sugar, baking powder, and salt in a large bowl.",
      "In another bowl, whisk milk, eggs, and melted butter until combined.",
      "Pour wet ingredients into dry ingredients and stir until just combined (lumpy is okay).",
      "Heat a buttered skillet or griddle over medium heat.",
      "Pour 1/4 cup batter onto the hot surface for each pancake.",
      "Cook until bubbles form on the surface, then flip and cook until golden brown.",
      "Serve warm with maple syrup and butter."
    ],
    "difficulty": "easy",
    "dietary_tags": ["vegetarian"]
  },
  {
    "id": "avocado-toast",

    "category": "breakfast",

    "ingredients": [
      "2 slices sourdough bread",

    "steps": [
      "Toast the sourdough slices until golden and crispy.",
      "Cut the avocado in half, remove the pit, and scoop the flesh into a bowl.",
      "Mash lightly with a fork, leaving some texture.",
      "Drizzle olive oil into the mashed avocado and stir gently.",
      "Spread the mixture evenly onto each toast slice.",
      "Season with salt, pepper, and a squeeze of fresh lemon juice.",
      "Sprinkle with red pepper flakes if desired and serve immediately."
    ],
    "difficulty": "easy",
    "dietary_tags": ["vegetarian", "vegan"]
  },
  {
    "id": "shakshuka",

    "category": "breakfast",

      "Season with salt and pepper to taste.",
      "Create 4 small wells in the sauce and crack an egg into each well.",

      "Garnish with fresh cilantro or parsley and serve with crusty bread."
    ],
    "difficulty": "medium",
    "dietary_tags": ["vegetarian"]
  },
  {
    "id": "grilled-salmon",

    "category": "main",

    "servings": 2,

  {

    "category": "main",
    "time": 20,
    "servings": 4,
    "ingredients": [
      "1 pound spaghetti or linguine",

      "Fresh parsley for garnish (optional)"
    ],
    "steps": [

      "While pasta cooks, cook chopped bacon in a large skillet over medium heat until crispy, about 5-7 minutes.",

      "Reserve 1 cup of pasta water, then drain the pasta.",

    "dietary_tags": []

    "ingredients": [
      "6 ounces dark chocolate, chopped",

      "Bake for 12-14 minutes until edges are firm but centers still jiggle slightly when gently shaken.",
      "Invert onto plates and serve immediately with vanilla ice cream or whipped cream."
    ],
    "difficulty": "medium",
    "dietary_tags": ["vegetarian"]
  },
  {
    "id": "lemon-bars",
    "name": "Lemon Bars",
    "description": "Tart, buttery lemon filling on a shortbread crust. These bars are bright, zesty, and perfect for sharing (if you can resist eating them all).",
    "category": "dessert",
    "time": 40,
    "servings": 12,
    "ingredients": [
      "1 cup all-purpose flour",
      "1/4 cup powdered sugar",
      "6 tablespoons cold butter",
      "2 eggs",
      "1 cup sugar",
      "3 tablespoons all-purpose flour",
      "1/2 teaspoon baking powder",
      "1/4 teaspoon salt",
      "4 tablespoons fresh lemon juice",
      "1 tablespoon lemon zest",

    "steps": [
      "Preheat oven to 350°F. Line an 8x8-inch baking pan with parchment paper.",

      "Fold in flour, baking powder, and salt.",
      "Stir in lemon juice and lemon zest.",

    "dietary_tags": ["vegetarian"]

  <!-- Application Logic -->
  <script src="app.js" defer></script>
</body>
</html>
