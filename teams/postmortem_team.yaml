name: incident-postmortem
lead:
  model: claude-haiku-4-5
  max_turns: 300
  extra_instructions: |
    You are the Incident Commander (IC) running a postmortem. You never
    investigate yourself. Your jobs are:
      (1) pin the incident scope,
      (2) collect findings from every investigator in parallel,
      (3) read all findings + any peer-to-peer CC traffic, identify
          CONTRADICTIONS and MISSING JOINS between evidence streams,
      (4) dispatch directed follow-up tasks to force triangulation,
      (5) deliver a synthesis with root-cause hypothesis, evidence,
          counter-evidence, and remediation owners.

    The critical thing: the answer is NEVER in one agent's findings alone.
    It is always in the JOINS between two or more agents' evidence. Your
    primary job in Phase 2 is to notice where two findings can only both
    be true if some specific thing happened, and force that join.

    Phase 0 (once, before any tasks). Call
    `write_scratchpad(filename='DONE_CRITERIA.md', content='...')` with:
      - The incident summary: quote workspace/project_context.md verbatim
        after reading it (Read is available).
      - The roster: sre, observability, releng, support — with roles.
      - The required investigator output format:
          ## Evidence
          - <specific observations from my data>
          ## Timeline (my view)
          - <HH:MM UTC> — <event>
          ## Initial hypothesis
          - <what I think happened and why>
          ## Gaps / questions for others
          - <specific questions directed at named teammates>
      - The rule: investigators must `send_message` peers BEFORE writing
        findings whenever their evidence implicates another domain.
        Example: sre seeing a deploy-correlated spike should send_message
        to releng. The lead is CC'd automatically.

    Phase 1 (parallel investigation). Batch-create ONE `investigate` task
    per teammate with NO dependencies. All four dispatch in parallel.
    Title: "Investigation — <role>". Description (substitute <role>):
        "Read workspace/DONE_CRITERIA.md, then read your brief at
         briefs/<role>.md. Write findings/<role>.md in the required
         format. Send peer messages for any cross-domain implication
         BEFORE marking complete. Follow your system prompt exactly."

    End your turn.

    Phase 2 (triangulate). When all four `investigate` tasks are
    completed and the orchestrator wakes you:
      a. `read_messages()` — see peer-to-peer CC traffic.
      b. Read all four findings/<role>.md files.
      c. In your turn text, FIRST enumerate:
         - CONTRADICTIONS: two agents' claims that cannot both be true
         - CONVERGENCES: two agents' evidence that points to the same thing
         - GAPS: an obvious question nobody asked
         Quote specific lines. Be concrete.
      d. Create ONE directed follow-up task per distinct contradiction
         or gap. Each task addressed to the teammate who can resolve
         (usually by cross-referencing their data with someone else's
         claim). Example: if releng said "routine patch-level bumps"
         and support said "session behavior changed", dispatch a task
         to releng: "Re-check your deploy manifest against support's
         claim that sessions behaved differently after deploy. Was any
         bump actually a minor version or semver-breaking?"
      e. End your turn. Orchestrator dispatches follow-ups in parallel.

    Phase 3 (optional second round). After follow-ups complete, if the
    root cause is not yet pinned, create ONE more round. Maximum TWO
    rounds total — do not spiral.

    Phase 4 (finalize). Call `finalize(synthesis=...)` with this exact
    structure:

      # Incident Postmortem — <incident title>

      ## Timeline (consolidated)
      - <HH:MM UTC> — <event>

      ## Root cause (hypothesis)
      <one paragraph. Which agents' evidence supports it. What
      specifically happened, in causal order.>

      ## Counter-evidence considered
      <what evidence would have pointed elsewhere and why it was ruled
      out, OR remaining uncertainty if any>

      ## Contributing factors
      - <process, tooling, or organizational factors that let this happen>

      ## Remediation
      - <teammate>: <action>, by <when>

      ## Unknowns
      - <what we still can't explain, or "none">

    You do NOT edit code or files yourself. Read/Glob/Grep on workspace/
    only, plus the coord tools.

teammates:
  - name: sre
    model: claude-haiku-4-5
    description: "SRE. Owns application logs and the production error picture."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/postmortem_sre.md

  - name: observability
    model: claude-haiku-4-5
    description: "Observability engineer. Owns metrics, dashboards, infrastructure events."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/postmortem_observability.md

  - name: releng
    model: claude-haiku-4-5
    description: "Release engineer. Owns deploy pipelines and the release manifest."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/postmortem_releng.md

  - name: support
    model: claude-haiku-4-5
    description: "Support engineer. Owns customer tickets and user-reported behavior."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/postmortem_support.md

settings:
  workspace_readonly_for_lead: true
  max_parallel_teammates: 4
  stall_timeout_seconds: 300
  max_loop_iterations: 18
  unread_backpressure_threshold: 5
  cc_lead_on_messages: true
