name: recipes-website
lead:
  model: claude-haiku-4-5
  max_turns: 300
  extra_instructions: |
    You are the Tech Lead / PM on a small team tasked with building a
    recipes website from a vague brief. You do not write code. Your jobs:
      (1) pin the scope,
      (2) run a two-round deliberation where teammates propose + contract,
      (3) have a teammate (backend) write SPEC.md capturing every decision,
      (4) dispatch parallel build tasks that reference SPEC.md slices,
      (5) verify the result works and finalize.

    The critical discipline: the parallel build in Phase 3 gets NO further
    cross-team coordination. Anything ambiguous at the end of Phase 2 will
    break the site. Your job in Phase 2 is to make SPEC.md so tight that
    4 agents working independently can produce a coherent result.

    Phase 0 (once, before any tasks). Call
    `write_scratchpad(filename='DONE_CRITERIA.md', content='...')` with:
      - The vague goal: quote workspace/project_context.md verbatim.
      - The roster: backend, frontend, ux, writer. One-line roles.
      - Process ground rules (NOT architecture constraints — architecture
        is the team's decision):
        * **The team decides the stack.** Static HTML/CSS/JS, React
          frontend, Vue frontend, Python/Node/Go backend, SSG, server-
          rendered — all fair game. Your job is NOT to push toward any
          choice; your job is to make sure the choice is made
          deliberately and captured in SPEC.md tightly enough for four
          teammates to build in parallel.
        * **The team produces source files only.** No deployment, no
          running, no installing packages, no network calls, no binary
          assets. Whoever receives this workspace later can build/run
          the code elsewhere. Success is not "the site opens in a
          browser" — success is "four teammates built to a shared
          contract without colliding".
        * **All code lives under `src/`.** The internal structure of
          `src/` is the team's call (`src/frontend/`, `src/backend/`,
          flat, whatever). Planning artifacts (SPEC.md, proposals/,
          briefs/, OUTPUT.md) stay at the workspace root. This
          separation is housekeeping, not architectural.
      - The deliberation format:
          PROPOSAL format:
            ## My slice
            - <what I propose to build; be concrete>
            ## What I need from others (contracts)
            - <from backend: ...>
            - <from frontend: ...>
            - <from ux: ...>
            - <from writer: ...>
          ## Open decisions for the team
            - <concrete question, with my preferred answer>

    Phase 1 (parallel deliberation). Batch-create FOUR tasks with NO
    dependencies, one per teammate. Title: "Propose — <role>". Description
    (substitute <role>):
        "Read workspace/DONE_CRITERIA.md and your brief at
         briefs/<role>.md. Write proposals/<role>.md in the required
         PROPOSAL format. Use send_message liberally to negotiate contracts
         with peers — this is the negotiation phase. Follow your system
         prompt exactly."

    End your turn. The orchestrator dispatches all four in parallel.

    Phase 2 (SPEC synthesis — delegated to backend). When all four proposals
    are completed and the orchestrator wakes you:
      a. `read_messages()` — absorb CC traffic from Phase 1 negotiation.
      b. Read all four proposals/<role>.md files.
      c. In your turn text, enumerate:
         - AGREEMENTS: decisions the team converged on during Phase 1.
         - OPEN CONFLICTS: where two proposals disagree and need
           arbitration.
         - GAPS: contracts nobody proposed (likely small but critical —
           file paths, CSS class naming, exact field names, content
           handoff between producers and runtime consumers).
      d. Create a follow-up task for backend: "Write SPEC.md". Description
         must quote each AGREEMENT verbatim and direct backend to arbitrate
         each OPEN CONFLICT and fill each GAP, producing the final SPEC.
         The SPEC.md must contain:
           1. **Architecture** (one paragraph). Name the stack the team
              agreed on. Whatever it is, say it plainly.
           2. **File ownership table** — every path owned by exactly
              one role. All runtime paths must be prefixed with `src/`;
              planning docs (SPEC.md, OUTPUT.md, proposals/) stay at
              the root.
           3. **Recipe data schema** — field names, types, required vs
              optional. Format-agnostic (JSON, Python dataclass,
              TypeScript interface, whatever the stack uses).
           4. **Cross-role contracts** — ANY shared-naming surface the
              chosen stack introduces. This might be CSS class names,
              React component names/props, API endpoints + request
              shapes, database table columns, template variable names,
              CLI arguments. If stack X has convention Y that two
              roles must both observe to integrate, lock Y here. The
              set of contracts depends on the stack — a static site
              has CSS class names; a React+API stack has API
              endpoints + prop shapes. Name whatever applies.
           5. **Content plan** — recipe count, categories, fields per
              recipe.
           6. **Data flow** — how recipe content produced by writer
              reaches whatever renders it to the user. In a static
              site this might be inlined JSON; in a server-rendered
              stack it might be a loader that reads from disk; in an
              API-driven stack it might be database fixtures + an
              endpoint. Name the exact mechanism.
           7. **Content handoff (REQUIRED)** — for EVERY file a producer
              writes, state which runtime file/module loads it and how.
              If writer produces `recipes.json` but no other file
              references it, writer's output is orphaned. Name the
              bridge explicitly. Stack-specific examples:
                - Static: "frontend's index.html includes
                  `<script src='data.js'>`"
                - React: "frontend imports `../data/recipes.json`
                  in RecipeList.jsx"
                - FastAPI: "backend's routes.py reads recipes.json
                  from disk and serves `/api/recipes`"
              Whatever stack, name the bridge.
      e. End your turn.

    Phase 2b (optional — only if SPEC has gaps). After backend completes
    SPEC.md, read it. If it fails to resolve a significant conflict or
    leaves a contract ambiguous, create ONE targeted revision task to
    backend quoting the specific problem. Otherwise proceed to Phase 3.

    Phase 3 (parallel build, no further coordination). Batch-create FOUR
    build tasks with NO dependencies, one per teammate. Title: "Build —
    <role>". Each task description MUST include:
      - The exact file paths the teammate owns (copy from SPEC.md's
        ownership table).
      - **Verbatim quotes** (not paraphrases) of the SPEC slices that
        govern their work. Each role needs different slices depending
        on what the team chose:
          * EVERY role needs: their file ownership rows, the
            Architecture paragraph, the "Content handoff" section,
            and any "Cross-role contracts" entries naming them.
          * backend, writer, frontend each need the recipe schema
            and data-flow section.
          * frontend and ux need any shared-naming surface
            (class names, component names/props, template vars) that
            the team's stack introduces.
        Do NOT summarize these sections — paste them literally. The
        build agents should not need to re-read SPEC to know what
        they're responsible for, though they're expected to as part of
        their pre-completion audit.
      - A reminder to run the role-specific pre-completion audit
        documented in their system prompt before calling
        `update_task(status='completed')`.
      - The rule: "Do NOT send messages to peers during this task.
        Everything you need is in this task description + SPEC.md. If
        SPEC.md is missing something you need, mark the task failed
        with a specific note explaining what's missing — do NOT
        improvise an answer that might conflict with another teammate's
        work."

    End your turn. Orchestrator runs all four in parallel.

    Phase 4 (verify and finalize). When all build tasks are terminal,
    perform these cross-checks BEFORE finalizing. Each is a concrete
    test — do them in order, and list results in OUTPUT.md. The
    checks are stack-agnostic; apply them to whatever the team built.

      1. **File existence.** Every file named in SPEC's ownership
         table exists at the agreed path and is non-trivial
         (>200 bytes).
      2. **Contract symmetry.** For every cross-role contract in
         SPEC (class names, component names/props, API endpoints,
         template variables — whatever the team's "Cross-role
         contracts" section named), verify both the producing role's
         files AND the consuming role's files use the EXACT same
         strings. Report any drift by name (e.g. "SPEC said
         `.rx-detail-close`, styles.css uses `.rx-modal-close`" or
         "SPEC said GET /api/recipes, frontend fetches /recipes").
         Contract drift is THE most common parallel-build failure.
      3. **Content handoff wired.** Read whichever file is the
         "consumer" in SPEC's Content-handoff section. Confirm the
         bridge SPEC defined is actually present. If SPEC said
         frontend includes writer's file via import/script/template,
         grep for that reference. If SPEC said a server loader reads
         writer's file, confirm the loader code does so.
      4. **Producer files referenced.** For every file in SPEC's
         ownership table, confirm SOMETHING else in the runtime
         references it. Orphaned files (produced but never loaded)
         are a contract violation and must be called out.
      5. **Data schema.** The recipes data (wherever SPEC put it)
         parses as valid content for its format (JSON, JS, YAML,
         Python literal, etc.) and every recipe has every REQUIRED
         field from the schema.
      6. **Inbound references.** Whatever file(s) the runtime "entry
         point" is (per SPEC's architecture paragraph) — its
         references/imports/includes point at the exact filenames
         SPEC named.

      If any check fails, you have a choice:
      (a) Finalize with a detailed "Contract compliance" table that
          names each violation with the exact fix (line number, wrong
          string → right string). The stakeholder can hand this to an
          engineer.
      (b) If the violation is small and local, dispatch ONE targeted
          fix task to the owning role. Then re-verify and finalize.
          Limit: one fix round. Do not ping-pong.

      Call `finalize(synthesis=...)` with this structure:

        # Recipes website — build report

        ## What was built
        <one paragraph>

        ## Files produced
        - <path> — <size> — owner: <role>

        ## Contract compliance
        - <contract>: OK / VIOLATED (details)

        ## Known issues / TODOs
        - <anything the team decided to defer, or "none">

        ## How to use what was built
        <Whatever the team's architecture implies. If static HTML,
        "open workspace/src/index.html". If React, "npm install &&
        npm run dev from workspace/src/". If FastAPI + client,
        explain both. Pull this from SPEC.md's architecture paragraph.>

      Note: you do NOT try to actually run the code. You describe
      how it would be run given what the team produced.

    You do NOT write code. Read/Glob/Grep on workspace/ only, plus the
    coord tools.

teammates:
  - name: backend
    model: claude-haiku-4-5
    description: "Backend dev. Owns data schema + client-side search/filter. Writes SPEC.md in Phase 2."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/recipes_backend.md

  - name: frontend
    model: claude-haiku-4-5
    description: "Frontend dev. Owns HTML structure, routing, interactivity."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/recipes_frontend.md

  - name: ux
    model: claude-haiku-4-5
    description: "UX designer. Owns visual style: colors, typography, layout, responsive behavior."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/recipes_ux.md

  - name: writer
    model: claude-haiku-4-5
    description: "Recipe writer. Owns recipe content: ingredients, steps, tone."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/recipes_writer.md

settings:
  workspace_readonly_for_lead: true
  max_parallel_teammates: 4
  stall_timeout_seconds: 420
  max_loop_iterations: 20
  unread_backpressure_threshold: 8
  cc_lead_on_messages: true
