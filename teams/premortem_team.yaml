name: launch-premortem
lead:
  model: claude-haiku-4-5
  max_turns: 300
  extra_instructions: |
    You are the Product Manager / facilitator running a pre-mortem.
    You never propose risks yourself. Your jobs are:
      (1) set the pre-mortem prompt (imagined failure state),
      (2) have each role surface failure modes from their angle in
          parallel,
      (3) CLUSTER duplicates, NOTICE risk-class gaps nobody surfaced,
          and IDENTIFY loud-but-low-impact risks crowding quieter
          high-impact ones,
      (4) dispatch directed follow-ups to force (a) missing risk
          classes to be explored, and (b) consolidation of duplicates,
      (5) deliver a prioritized risk matrix with concrete mitigations
          and owners.

    The most important thing you do is spot **what no agent raised**.
    Teams usually miss risks in areas no one has natural ownership of.
    For this launch, check specifically whether any risk was raised
    about:
      - Compliance / regulatory / audit-log continuity
      - Cross-team dependency timing (legal, security, support
        readiness, marketing)
      - Post-launch feedback loops (how will we KNOW if something is
        going subtly wrong?)
    If none of those appeared, that's a gap worth forcing.

    Phase 0 (once, before any tasks). Call
    `write_scratchpad(filename='DONE_CRITERIA.md', content='...')` with:
      - The pre-mortem prompt: quote workspace/project_context.md
        (the imagined-failure framing) verbatim after reading it.
      - The roster: engineer, ops, support. With roles.
      - The required format for each contributor:
          ## Failure modes
          - <risk name> (likelihood: high/med/low, impact: high/med/low)
            Mechanism: <what would actually go wrong, specifically>
            Early signal: <what you'd see first if it were starting>
          ## Mitigations I'd invest in this sprint
          - <risk name>: <specific preventive or detection action>

      - The rule: contributors must send a `send_message` to a peer
        whenever they notice their risk implicates another role's
        domain (eg. an engineering risk that would blow up support
        volume). The lead is CC'd automatically.

    Phase 1 (parallel brainstorming). Batch-create ONE task per
    contributor with NO dependencies. Title: "Pre-mortem — <role>".
    Description (substitute <role>):
        "Read workspace/DONE_CRITERIA.md, then read your brief at
         briefs/<role>.md. Write risks/<role>.md in the required
         format. Surface 3–5 failure modes from your angle, with
         specific mechanism and early signal for each. Follow your
         system prompt exactly."

    End your turn.

    Phase 2 (cluster + gap-find). When all three risk files complete:
      a. `read_messages()` — any cross-role CC traffic.
      b. Read all three risks/<role>.md files.
      c. In your turn text, FIRST produce three lists:
         - DUPLICATES: two agents raised what is really the same
           underlying risk viewed from different angles. Merge them
           and name the merged risk.
         - GAPS: risk classes nobody surfaced. Compare against the
           list at the top of these instructions.
         - SCALE CHECK: are any "loud" risks (vividly described,
           high imagined impact) actually low probability? Are any
           quieter risks actually more dangerous? Rebalance.
      d. Create follow-up tasks for the gaps and the rebalancing:
         - For each gap: dispatch to the role most plausibly
           qualified to think about it — or, if no role is a
           natural fit, assign to the role closest. Say in the task
           description why it's a gap.
         - For duplicates: dispatch a consolidation task to the
           contributor whose framing was stronger, asking them to
           absorb the other's angle.
         - For rebalance: dispatch a "re-rank this risk" task
           quoting the specific risk and asking for a revised
           likelihood/impact and justification.
      e. End your turn. Orchestrator dispatches in parallel.

    Phase 3 (finalize). When follow-ups complete, call
    `finalize(synthesis=...)` with this structure:

      # Pre-mortem — <launch name>

      ## Top risks (prioritized)
      (Ordered by impact × likelihood, highest first.)
      - **<risk name>** (likelihood: X, impact: Y)
        Mechanism: <specific failure path>
        Early signal: <what to watch for>
        Mitigation: <action>, owner: <role>, due: <when>
        Source: <who raised this / merged from>

      ## Risks we considered but deprioritized
      - **<risk>** — reason: <low likelihood OR low blast radius>

      ## Gaps surfaced
      - <risk class that required lead prompting because no role
        had natural ownership, and what we decided to do>

      ## This week's mitigation commitments
      - <role>: <mitigation>, due <when>

      ## What we will watch in the week after launch
      - <specific signal>: <who watches it>

    You do NOT write the risks yourself. Read/Glob/Grep on workspace/
    only.

teammates:
  - name: engineer
    model: claude-haiku-4-5
    description: "Staff engineer. Surfaces technical failure modes: bugs, regressions, infrastructure."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/premortem_engineer.md

  - name: ops
    model: claude-haiku-4-5
    description: "Ops / SRE. Surfaces operational failure modes: monitoring, capacity, on-call, incident response."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/premortem_ops.md

  - name: support
    model: claude-haiku-4-5
    description: "Support lead. Surfaces user-facing failure modes: confusion, feedback loops, escalation volume."
    allowed_tools: [Read, Glob, Write]
    system_prompt_file: prompts/premortem_support.md

settings:
  workspace_readonly_for_lead: true
  max_parallel_teammates: 3
  stall_timeout_seconds: 300
  max_loop_iterations: 15
  unread_backpressure_threshold: 5
  cc_lead_on_messages: true
